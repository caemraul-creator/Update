<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Inventaris</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body{
      background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      margin:0;
    }
    .card-login{
      max-width:380px;
      width:100%;
      border-radius:16px;
      box-shadow:0 20px 40px rgba(15,23,42,.35);
    }
  </style>
</head>
<body>
<div class="card card-login">
  <div class="card-body p-4">
    <h4 class="mb-3 text-center">Login Inventaris</h4>
    <p class="text-muted small text-center mb-4">Masuk untuk mengelola data barang</p>
    <form id="loginForm" novalidate>
      <div class="mb-3">
        <!-- FIX: Ganti field 'username' → 'email', type text → email -->
        <label class="form-label">Email / Username</label>
        <input type="text" name="email" class="form-control"
               placeholder="contoh: admin@sekolah.com" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="button" id="btnLogin" class="btn btn-primary w-100" onclick="doLogin()">
        Login
      </button>
      <div id="errorMsg" class="text-danger small mt-2"></div>
    </form>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyKnjybJowQti_vLIpUd54wT5CBTXjhWXnqFKm6XDChcdjeTcSx4AvlCSc58h00lgH5/exec';

function apiRaw(action, params){
  const body = new URLSearchParams({ action });
  Object.entries(params).forEach(function([k,v]){
    if (v !== undefined && v !== null) body.append(k, v);
  });
  return fetch(GAS_URL, { method:'POST', body })
    .then(function(r){ return r.json(); })
    .then(function(res){
      if (!res.success) throw new Error(res.error || 'Terjadi kesalahan');
      return res.data;
    });
}

function doLogin(){
  const form  = document.getElementById('loginForm');
  const btn   = document.getElementById('btnLogin');
  const errEl = document.getElementById('errorMsg');
  errEl.textContent = '';

  if (!form.checkValidity()){
    form.reportValidity();
    return;
  }

  const fd       = new FormData(form);
  // FIX: ambil field 'email' (bukan 'username')
  const email    = (fd.get('email') || '').trim();
  const password = (fd.get('password') || '').trim();

  if (!email || !password){
    errEl.textContent = 'Email dan password wajib diisi.';
    return;
  }

  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Masuk...';

  // FIX: kirim field 'email' ke GAS
  apiRaw('login', { email: email, password: password })
    .then(function(u){
      // GAS kini mengembalikan { token, username, nama, role } secara flat
      localStorage.setItem('token',    u.token    || '');
      localStorage.setItem('username', u.username || u.email || email);
      localStorage.setItem('nama',     u.nama     || '');
      localStorage.setItem('role',     u.role     || 'viewer');
      window.location.href = 'dashboard.html';
    })
    .catch(function(err){
      errEl.textContent = 'Login gagal: ' + err.message;
    })
    .finally(function(){
      btn.disabled  = false;
      btn.innerHTML = 'Login';
    });
}

// Enter di field langsung panggil doLogin
document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  doLogin();
});
</script>
</body>
</html>
