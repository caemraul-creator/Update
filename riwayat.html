<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Transaksi</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0f1117; --ink2: #3d4350; --ink3: #8891a5;
            --border: #e4e7ef; --bg: #f0f2f8; --surface: #ffffff;
            --accent: #3b5bdb; --accent2: #4c6ef5;
            --green: #0ca678; --red: #f03e3e; --amber: #f59f00;
            --surface2: #f8f9fc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* TOPBAR */
        .topbar {
            background: var(--ink); color: #fff;
            padding: 0 24px; height: 56px;
            display: flex; align-items: center; gap: 10px; flex-shrink: 0;
            overflow-x: auto;
        }
        .topbar::-webkit-scrollbar { height: 0; }
        .topbar-logo { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--accent2); text-transform: uppercase; }
        .topbar-title { font-size: 15px; font-weight: 700; flex: 1; white-space: nowrap; }
        .nav-link {
            padding: 7px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
            text-decoration: none; color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
        }
        .nav-link:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .nav-link.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* FILTER BAR */
        .filter-bar {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 12px 24px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap;
        }
        .filter-group { display: flex; align-items: center; gap: 8px; }
        .filter-label { font-size: 12px; font-weight: 700; color: var(--ink2); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
        .filter-input {
            padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 9px;
            font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink);
            background: var(--bg); outline: none; transition: border-color 0.15s;
        }
        .filter-input:focus { border-color: var(--accent2); background: #fff; }
        .filter-select {
            padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 9px;
            font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink);
            background: var(--bg); outline: none; cursor: pointer; transition: border-color 0.15s;
        }
        .filter-select:focus { border-color: var(--accent2); background: #fff; }
        .divider { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }
        .summary-chips { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; align-items: center; }
        .chip {
            padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 700;
            font-family: 'DM Mono', monospace;
        }
        .chip-blue { background: #dbe4ff; color: var(--accent); }
        .chip-green { background: #d3f9d8; color: var(--green); }

        /* PAYMENT METHOD SUMMARY */
        .payment-summary {
            background: var(--surface2); border-bottom: 1px solid var(--border);
            padding: 8px 24px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
            overflow-x: auto; flex-wrap: wrap;
        }
        .payment-summary::-webkit-scrollbar { height: 0; }
        .payment-pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
            white-space: nowrap; flex-shrink: 0;
        }
        .pill-tunai { background: #e6fcf5; color: #0ca678; border: 1px solid #b2f2d0; }
        .pill-transfer { background: #dbe4ff; color: #3b5bdb; border: 1px solid #bac8ff; }
        .pill-qris { background: #f8f0ff; color: #7950f2; border: 1px solid #d0bfff; }
        .pill-kartu { background: #fff0f6; color: #e64980; border: 1px solid #fcc2d7; }
        .payment-pill .pill-icon { font-size: 13px; }
        .payment-pill .pill-amount { font-family: 'DM Mono', monospace; font-weight: 700; }
        .payment-pill .pill-count { opacity: 0.7; font-size: 10px; }

        /* CONTENT */
        .content { flex: 1; overflow-y: auto; padding: 0; display: flex; gap: 0; overflow: hidden; position: relative; }
        .content::-webkit-scrollbar { width: 6px; }
        .content::-webkit-scrollbar-thumb { background: #d0d5e8; border-radius: 3px; }

        /* TRANSACTION LIST */
        .trx-list {
            width: 380px; flex-shrink: 0;
            background: var(--surface); border-right: 1px solid var(--border);
            overflow-y: auto; display: flex; flex-direction: column;
        }
        .trx-list::-webkit-scrollbar { width: 4px; }
        .trx-list::-webkit-scrollbar-thumb { background: #d0d5e8; }

        /* Mobile back button */
        .detail-back-btn {
            display: none;
            padding: 10px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
        }
        .detail-back-btn:hover { background: var(--surface2); }
        .detail-back-btn .back-arrow { font-size: 18px; }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .content { flex-direction: column; position: relative; }
            .trx-list {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                flex: 1;
            }
            .detail-panel {
                position: absolute;
                top: 0; left: 0; right: 0; bottom: 0;
                z-index: 100;
                background: var(--bg);
                transform: translateX(100%);
                transition: transform 0.3s ease;
                overflow-y: auto;
                padding: 0;
            }
            .detail-panel.mobile-show {
                transform: translateX(0);
            }
            .detail-back-btn {
                display: flex;
                position: sticky;
                top: 0;
                z-index: 101;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                padding: 12px 16px;
            }
        }

        .trx-item {
            padding: 14px 20px; border-bottom: 1px solid var(--border);
            cursor: pointer; transition: background 0.1s; position: relative;
        }
        .trx-item:hover { background: var(--surface2); }
        .trx-item.active { background: #eef2ff; border-left: 3px solid var(--accent); }

        .trx-item .trx-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .trx-id { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700; color: var(--accent); }
        .trx-total { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 800; color: var(--ink); }
        .trx-meta { font-size: 12px; color: var(--ink3); }
        .trx-items-preview { font-size: 12px; color: var(--ink2); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .method-badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 10px; font-weight: 700; font-family: 'DM Mono', monospace;
            margin-left: 6px;
        }
        .method-tunai { background: #e6fcf5; color: var(--green); }
        .method-transfer { background: #dbe4ff; color: var(--accent); }
        .method-qris { background: #f8f0ff; color: #7950f2; }
        .method-kartu { background: #fff0f6; color: #e64980; }

        /* PAGINATION */
        .pagination {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 12px 16px; background: var(--surface2); border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .pagination button {
            padding: 6px 16px; border-radius: 8px; font-size: 12px; font-weight: 700;
            border: 1.5px solid var(--border); background: var(--surface); color: var(--ink2);
            cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
        }
        .pagination button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #eef2ff; }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .pagination .page-info {
            font-size: 12px; color: var(--ink3); font-weight: 600;
            font-family: 'DM Mono', monospace;
        }

        /* DETAIL PANEL */
        .detail-panel {
            flex: 1; overflow-y: auto; padding: 0;
            background: var(--bg);
        }
        .detail-panel::-webkit-scrollbar { width: 6px; }
        .detail-panel::-webkit-scrollbar-thumb { background: #d0d5e8; }

        /* Detail content wrapper */
        #detail-content { padding: 24px; }
        @media (max-width: 768px) {
            #detail-content { padding: 16px; }
        }

        .detail-empty {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; color: var(--ink3); gap: 12px;
        }
        .detail-empty .icon { font-size: 48px; }

        .detail-card {
            background: var(--surface); border-radius: 14px; padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 16px;
        }
        .detail-card h4 { font-size: 13px; font-weight: 700; color: var(--ink2); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }

        .detail-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
        .detail-row .label { color: var(--ink3); }
        .detail-row .value { font-weight: 600; color: var(--ink); }
        .detail-row .value.mono { font-family: 'DM Mono', monospace; }

        .items-table { width: 100%; border-collapse: collapse; }
        .items-table th {
            font-size: 11px; font-weight: 700; color: var(--ink3); text-transform: uppercase;
            letter-spacing: 0.5px; padding: 6px 8px; border-bottom: 2px solid var(--border);
            text-align: left;
        }
        .items-table th.right { text-align: right; }
        .items-table td { padding: 9px 8px; font-size: 13px; border-bottom: 1px solid var(--border); }
        .items-table tr:last-child td { border-bottom: none; }
        .items-table .td-name { font-weight: 600; }
        .items-table .td-right { text-align: right; font-family: 'DM Mono', monospace; font-size: 12px; }

        .total-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0 0; margin-top: 8px; border-top: 2px solid var(--border);
        }
        .total-row .total-label { font-size: 14px; font-weight: 700; color: var(--ink); }
        .total-row .total-amount { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 800; color: var(--ink); }

        .action-row { display: flex; gap: 10px; margin-top: 16px; }
        .action-row button {
            flex: 1; padding: 11px; border-radius: 10px; font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 700; cursor: pointer; border: none; transition: all 0.15s;
        }
        .btn-del-detail { background: #fff5f5; color: var(--red); border: 1.5px solid #ffd0d0; }
        .btn-del-detail:hover { background: var(--red); color: #fff; border-color: var(--red); }
        .btn-wa-detail { background: #25d366; color: #fff; }
        .btn-wa-detail:hover { background: #1da851; }
        .btn-print-detail { background: var(--accent); color: #fff; }
        .btn-print-detail:hover { background: var(--accent2); }

        /* Batch delete button */
        .btn-batch-del {
            padding: 6px 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif;
            font-size: 12px; font-weight: 700; cursor: pointer;
            background: #fff5f5; color: var(--red); border: 1.5px solid #ffd0d0;
            transition: all 0.15s; white-space: nowrap;
        }
        .btn-batch-del:hover { background: var(--red); color: #fff; border-color: var(--red); }

        /* Loading / Empty */
        .loading { text-align: center; padding: 40px; color: var(--ink3); font-size: 14px; }
        .empty-state { text-align: center; padding: 40px; color: var(--ink3); }
        .empty-state .icon { font-size: 40px; margin-bottom: 10px; }

        /* Pelanggan tag */
        .pel-tag {
            display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
            font-weight: 700; background: #dbe4ff; color: var(--accent); margin-left: 4px;
        }

        /* Toast with undo */
        .toast-overlay {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9999;
        }
        .toast-box {
            background: var(--ink); color: #fff; padding: 12px 20px; border-radius: 10px;
            font-size: 13px; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: 12px; white-space: nowrap;
            animation: toastSlide 0.3s ease;
        }
        .toast-box .undo-btn {
            background: var(--accent); color: #fff; border: none; padding: 5px 14px;
            border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer;
            font-family: 'DM Sans', sans-serif; transition: background 0.15s;
        }
        .toast-box .undo-btn:hover { background: var(--accent2); }
        .toast-box .toast-timer {
            width: 60px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px;
            overflow: hidden;
        }
        .toast-box .toast-timer-bar {
            height: 100%; background: var(--accent); border-radius: 2px;
            animation: timerShrink 5s linear forwards;
        }
        @keyframes toastSlide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes timerShrink { from { width: 100%; } to { width: 0%; } }
    .mobile-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #0f1117; padding: 6px 0 calc(6px + env(safe-area-inset-bottom)); z-index: 200; border-top: 1px solid rgba(255,255,255,0.1); justify-content: space-around; align-items: center; }
    .bnav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none; color: rgba(255,255,255,0.5); font-size: 10px; font-weight: 600; padding: 4px 8px; transition: color 0.2s; }
    .bnav-item.active, .bnav-item:hover { color: #4c6ef5; }
    .bnav-icon { font-size: 20px; }
    .bnav-label { font-size: 9px; }
    @media (max-width: 768px) { .mobile-bottom-nav { display: flex; } body { padding-bottom: 70px !important; } }
    @media (max-width: 768px) {
        .topbar { padding: 0 12px; }
        .topbar .nav-link { display: none !important; }
        html, body { max-width: 100vw; overflow-x: hidden; }
        .filter-bar { padding: 10px 12px !important; }
        .filter-group { width: 100%; }
        .filter-input, .filter-select { flex: 1; min-width: 0; }
        #filter-search { width: 100% !important; }
        .divider { display: none; }
        .summary-chips { margin-left: 0; width: 100%; }
        .payment-summary { padding: 8px 12px; }
        .content { padding: 0 !important; }
        .action-row { flex-wrap: wrap; }
        .action-row button { font-size: 12px; padding: 10px 8px; }
        .toast-overlay { bottom: 80px; }
        .total-amount { font-size: 16px !important; }
        .detail-card { padding: 14px; }
        .items-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .items-table th, .items-table td { white-space: nowrap; }
        .pagination button { padding: 6px 12px; font-size: 11px; }
        .trx-item { padding: 12px 16px; }
    }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <span class="topbar-logo">POS</span>
    <span class="topbar-title">📋 Riwayat Transaksi</span>
    <a href="index.html" class="nav-link" onclick="localStorage.setItem('appRole','kasir')">🏪 Kasir</a>
    <a href="riwayat.html" class="nav-link active">📋 Riwayat</a>
    <a href="rekap.html" class="nav-link">📊 Rekap</a>
    <a href="pelanggan.html" class="nav-link">👥 Pelanggan</a>
    <a href="kadaluarsa.html" class="nav-link">🗓️ Kadaluarsa</a>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
    <div class="filter-group">
        <span class="filter-label">Dari</span>
        <input type="date" class="filter-input" id="filter-dari" onchange="applyFilter()">
    </div>
    <div class="filter-group">
        <span class="filter-label">Sampai</span>
        <input type="date" class="filter-input" id="filter-sampai" onchange="applyFilter()">
    </div>
    <div class="divider"></div>
    <div class="filter-group">
        <span class="filter-label">Metode</span>
        <select class="filter-select" id="filter-metode" onchange="applyFilter()">
            <option value="">Semua</option>
            <option value="Tunai">Tunai</option>
            <option value="Transfer">Transfer</option>
            <option value="QRIS">QRIS</option>
            <option value="Kartu">Kartu</option>
        </select>
    </div>
    <div class="filter-group">
        <span class="filter-label">Cari</span>
        <input type="text" class="filter-input" id="filter-search" placeholder="Nama produk / pelanggan..." oninput="applyFilter()" style="width:220px;">
    </div>
    <div class="summary-chips">
        <div class="chip chip-blue" id="chip-count">0 Transaksi</div>
        <div class="chip chip-green" id="chip-total">Rp 0</div>
        <button class="btn-batch-del" id="btn-batch-del" style="display:none;" onclick="batchDelete()">🗑 Hapus Semua Filter</button>
    </div>
</div>

<!-- PAYMENT METHOD SUMMARY -->
<div class="payment-summary" id="payment-summary"></div>

<!-- CONTENT -->
<div class="content">
    <!-- Left: List -->
    <div class="trx-list" id="trx-list">
        <div class="loading">⏳ Memuat data...</div>
    </div>
    <!-- Right: Detail -->
    <div class="detail-panel" id="detail-panel">
        <div class="detail-back-btn" id="detail-back-btn" onclick="closeDetailMobile()">
            <span class="back-arrow">←</span>
            <span>Kembali ke Daftar Transaksi</span>
        </div>
        <div id="detail-content">
            <div class="detail-empty">
                <div class="icon">📋</div>
                <p>Pilih transaksi untuk melihat detail</p>
            </div>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast-overlay" id="toast-overlay"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>

<script>
var db, transaksiRef;
var allTransaksi = {};
var filteredList = [];
var activeId = null;
var _filterTimeout = null; // Untuk debounce filter

// Pagination
var currentPage = 1;
var perPage = 20;

// Undo support
var deletedTransaction = null; // { id, data }
var undoTimer = null;

var BULAN = ['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];

try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    transaksiRef = db.ref('transaksi');
    transaksiRef.on('value', function(snap) {
        allTransaksi = snap.val() || {};
        setDefaultDates();
        applyFilter();
    });
} catch(e) {
    document.getElementById('trx-list').innerHTML = '<div class="loading">❌ Gagal koneksi: ' + e.message + '</div>';
}

function setDefaultDates() {
    var dari = document.getElementById('filter-dari');
    var sampai = document.getElementById('filter-sampai');
    if (!dari || !sampai) return;
    
    if (!dari.value && !sampai.value) {
        var now = new Date();
        var y = now.getFullYear();
        var m = String(now.getMonth() + 1).padStart(2, '0');
        dari.value = y + '-' + m + '-01';
        var lastDay = new Date(y, now.getMonth() + 1, 0).getDate();
        sampai.value = y + '-' + m + '-' + String(lastDay).padStart(2, '0');
    }
}

function isFilterActive() {
    var dari = document.getElementById('filter-dari').value;
    var sampai = document.getElementById('filter-sampai').value;
    var metode = document.getElementById('filter-metode').value;
    var search = document.getElementById('filter-search').value.trim();
    // Filter is "active" if any non-default filter is set (not just default dates)
    return metode !== '' || search !== '';
}

function applyFilter() {
    if (_filterTimeout) clearTimeout(_filterTimeout);
    _filterTimeout = setTimeout(function() {
        _applyFilter();
    }, 300);
}

function _applyFilter() {
    var dari = document.getElementById('filter-dari').value;
    var sampai = document.getElementById('filter-sampai').value;
    var metode = document.getElementById('filter-metode').value;
    var search = document.getElementById('filter-search').value.toLowerCase().trim();

    var dariTs = dari ? new Date(dari).getTime() : 0;
    var sampaiTs = sampai ? new Date(sampai + 'T23:59:59').getTime() : Infinity;

    filteredList = Object.entries(allTransaksi).filter(function(entry) {
        var t = entry[1];
        var ts = t.timestamp || 0;
        if (ts < dariTs || ts > sampaiTs) return false;
        if (metode && t.metode !== metode) return false;
        if (search) {
            var inItems = t.items && t.items.some(function(i) { return i.name.toLowerCase().includes(search); });
            var inPel = t.pelanggan_nama && t.pelanggan_nama.toLowerCase().includes(search);
            if (!inItems && !inPel) return false;
        }
        return true;
    }).sort(function(a, b) {
        return (b[1].timestamp || 0) - (a[1].timestamp || 0);
    });

    // Reset to page 1 when filter changes
    currentPage = 1;

    var totalSum = filteredList.reduce(function(s, e){ return s + (e[1].total || 0); }, 0);
    document.getElementById('chip-count').textContent = filteredList.length + ' Transaksi';
    document.getElementById('chip-total').textContent = 'Rp ' + totalSum.toLocaleString('id-ID');

    // Show/hide batch delete button
    var batchBtn = document.getElementById('btn-batch-del');
    batchBtn.style.display = isFilterActive() && filteredList.length > 0 ? '' : 'none';

    renderPaymentSummary();
    renderList();
}

// ====== PAYMENT METHOD SUMMARY ======
function renderPaymentSummary() {
    var container = document.getElementById('payment-summary');
    if (!container) return;

    // Use all filtered transactions (not paginated)
    var methods = { Tunai: { total: 0, count: 0 }, Transfer: { total: 0, count: 0 }, QRIS: { total: 0, count: 0 }, Kartu: { total: 0, count: 0 } };
    filteredList.forEach(function(entry) {
        var t = entry[1];
        var m = t.metode || 'Tunai';
        if (methods[m]) {
            methods[m].total += t.total || 0;
            methods[m].count++;
        }
    });

    var icons = { Tunai: '💵', Transfer: '🏦', QRIS: '📱', Kartu: '💳' };
    var pillClass = { Tunai: 'pill-tunai', Transfer: 'pill-transfer', QRIS: 'pill-qris', Kartu: 'pill-kartu' };

    var html = '';
    Object.keys(methods).forEach(function(m) {
        var d = methods[m];
        if (d.count === 0) return;
        html += '<div class="payment-pill ' + pillClass[m] + '">' +
            '<span class="pill-icon">' + icons[m] + '</span>' +
            '<span>' + m + '</span>' +
            '<span class="pill-amount">Rp ' + d.total.toLocaleString('id-ID') + '</span>' +
            '<span class="pill-count">(' + d.count + ')</span>' +
            '</div>';
    });

    container.innerHTML = html || '<span style="font-size:12px;color:var(--ink3);">Tidak ada data</span>';
}

// ====== PAGINATED LIST RENDER ======
function renderList() {
    var container = document.getElementById('trx-list');
    if (!container) return;
    
    if (filteredList.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Tidak ada transaksi ditemukan</p></div>';
        return;
    }

    // Paginate
    var totalPages = Math.ceil(filteredList.length / perPage);
    if (currentPage > totalPages) currentPage = totalPages;
    var startIdx = (currentPage - 1) * perPage;
    var endIdx = Math.min(startIdx + perPage, filteredList.length);
    var pageItems = filteredList.slice(startIdx, endIdx);

    var html = '';
    pageItems.forEach(function(entry) {
        var id = entry[0];
        var t = entry[1];
        var d = new Date(t.timestamp || 0);
        var noStruk = id.slice(-8).toUpperCase();
        var dateStr = d.getDate() + ' ' + BULAN[d.getMonth()+1] + ' ' + d.getFullYear();
        var timeStr = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
        var metode = t.metode || 'Tunai';
        var methodKey = metode.toLowerCase().replace(' ','');
        var methodClass = 'method-' + methodKey;
        var preview = t.items ? t.items.slice(0,3).map(function(i){return i.name;}).join(', ') + (t.items.length > 3 ? ' +lainnya' : '') : '—';
        var pelTag = t.pelanggan_nama ? '<span class="pel-tag">👤 ' + escHtml(t.pelanggan_nama) + '</span>' : '';
        var activeClass = id === activeId ? ' active' : '';

        html += '<div class="trx-item' + activeClass + '" onclick="showDetail(\'' + id + '\')">' +
            '<div class="trx-top">' +
            '<span class="trx-id">#' + noStruk + '<span class="method-badge ' + methodClass + '">' + metode + '</span></span>' +
            '<span class="trx-total">Rp ' + (t.total||0).toLocaleString('id-ID') + '</span>' +
            '</div>' +
            '<div class="trx-meta">' + dateStr + ' · ' + timeStr + pelTag + '</div>' +
            '<div class="trx-items-preview">' + escHtml(preview) + '</div>' +
            '</div>';
    });

    // Pagination controls
    html += '<div class="pagination">';
    html += '<button ' + (currentPage <= 1 ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage - 1) + ')">← Prev</button>';
    html += '<span class="page-info">Halaman ' + currentPage + ' dari ' + totalPages + '</span>';
    html += '<button ' + (currentPage >= totalPages ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage + 1) + ')">Next →</button>';
    html += '</div>';

    container.innerHTML = html;
}

function goToPage(page) {
    var totalPages = Math.ceil(filteredList.length / perPage);
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    // Scroll list to top
    var listEl = document.getElementById('trx-list');
    if (listEl) listEl.scrollTop = 0;
    renderList();
}

function closeDetailMobile() {
    var panel = document.getElementById('detail-panel');
    if (panel) panel.classList.remove('mobile-show');
    activeId = null;
    renderList();
}

function showDetail(id) {
    activeId = id;
    renderList();

    var t = allTransaksi[id];
    if (!t) return;

    // On mobile, slide in detail panel
    var panel = document.getElementById('detail-panel');
    if (panel && window.innerWidth <= 768) {
        panel.classList.add('mobile-show');
    }

    var d = new Date(t.timestamp || 0);
    var pad = function(n){ return String(n).padStart(2,'0'); };
    var noStruk = id.slice(-8).toUpperCase();
    var tglStr = d.getDate() + ' ' + BULAN[d.getMonth()+1] + ' ' + d.getFullYear() + ', ' + pad(d.getHours()) + ':' + pad(d.getMinutes());

    var itemRows = '';
    var items = t.items || [];
    items.forEach(function(item, i) {
        var harga = item.price || item.harga_normal || item.harga_grosir || 0;
        itemRows += '<tr><td class="td-name">' + escHtml(item.name) + '</td>' +
            '<td class="td-right">' + (item.qty||0) + '×</td>' +
            '<td class="td-right">Rp ' + harga.toLocaleString('id-ID') + '</td>' +
            '<td class="td-right">Rp ' + (item.subtotal||0).toLocaleString('id-ID') + '</td>' +
            '</tr>';
    });

    var payDetails = '';
    if (t.metode === 'Tunai') {
        payDetails = '<div class="detail-row"><span class="label">Uang Bayar</span><span class="value mono">Rp ' + (t.bayar||t.uang_bayar||0).toLocaleString('id-ID') + '</span></div>' +
            '<div class="detail-row"><span class="label">Kembalian</span><span class="value mono" style="color:var(--green)">Rp ' + (t.kembalian||0).toLocaleString('id-ID') + '</span></div>';
    }

    var detailContent = document.getElementById('detail-content');
    detailContent.innerHTML =
        '<div class="detail-card">' +
        '<h4>Info Transaksi</h4>' +
        '<div class="detail-row"><span class="label">No. Struk</span><span class="value mono" style="color:var(--accent)">#' + noStruk + '</span></div>' +
        '<div class="detail-row"><span class="label">Waktu</span><span class="value">' + tglStr + '</span></div>' +
        '<div class="detail-row"><span class="label">Metode</span><span class="value">' + (t.metode||'Tunai') + '</span></div>' +
        (t.pelanggan_nama ? '<div class="detail-row"><span class="label">Pelanggan</span><span class="value">👤 ' + escHtml(t.pelanggan_nama) + '</span></div>' : '') +
        payDetails +
        '</div>' +
        '<div class="detail-card">' +
        '<h4>Detail Item</h4>' +
        '<table class="items-table">' +
        '<thead><tr><th>Produk</th><th class="right">Qty</th><th class="right">Harga</th><th class="right">Subtotal</th></tr></thead>' +
        '<tbody>' + itemRows + '</tbody>' +
        '</table>' +
        '<div class="total-row">' +
        '<span class="total-label">Total</span>' +
        '<span class="total-amount">Rp ' + (t.total||0).toLocaleString('id-ID') + '</span>' +
        '</div>' +
        '</div>' +
        '<div class="action-row">' +
        '<button class="btn-del-detail" onclick="deleteTransaksi(\'' + id + '\')" title="Hapus Transaksi">🗑 Hapus</button>' +
        '<button class="btn-wa-detail" onclick="shareWADetail(\'' + id + '\')">' +
        '<svg viewBox="0 0 24 24" fill="currentColor" style="width:14px;height:14px;vertical-align:middle;margin-right:5px;"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.104.546 4.08 1.502 5.797L.057 23.716a.5.5 0 00.614.62l5.984-1.427A11.956 11.956 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.916 0-3.713-.5-5.267-1.375l-.377-.22-3.906.931.958-3.802-.239-.386A10 10 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>' +
        'Kirim WA' +
        '</button>' +
        '<button class="btn-print-detail" onclick="printDetail(\'' + id + '\')">🖨 Print Struk</button>' +
        '</div>';
}

// ====== DELETE WITH UNDO ======
function deleteTransaksi(id) {
    var t = allTransaksi[id];
    if (!t) return;
    var noStruk = id.slice(-8).toUpperCase();
    if (!confirm('Hapus transaksi #' + noStruk + '?\nData stok TIDAK otomatis kembali.')) return;

    // Store for undo
    deletedTransaction = { id: id, data: JSON.parse(JSON.stringify(t)) };

    transaksiRef.child(id).remove().then(function() {
        activeId = null;
        var detailContent = document.getElementById('detail-content');
        if (detailContent) detailContent.innerHTML = '<div class="detail-empty" style="padding:24px;"><div class="icon">✅</div><p>Transaksi berhasil dihapus</p></div>';
        closeDetailMobile();
        showUndoToast();
    }).catch(function(e) {
        alert('Gagal hapus: ' + e.message);
    });
}

function showUndoToast() {
    if (undoTimer) clearTimeout(undoTimer);
    var overlay = document.getElementById('toast-overlay');
    var noStruk = deletedTransaction.id.slice(-8).toUpperCase();
    overlay.innerHTML =
        '<div class="toast-box">' +
        '<span>🗑 Transaksi #' + noStruk + ' dihapus</span>' +
        '<button class="undo-btn" onclick="undoDelete()">↩ Undo</button>' +
        '<div class="toast-timer"><div class="toast-timer-bar"></div></div>' +
        '</div>';

    undoTimer = setTimeout(function() {
        dismissUndoToast();
    }, 5000);
}

function undoDelete() {
    if (!deletedTransaction) return;
    var entry = deletedTransaction;
    deletedTransaction = null;

    if (undoTimer) clearTimeout(undoTimer);
    undoTimer = null;

    transaksiRef.child(entry.id).set(entry.data).then(function() {
        dismissUndoToast();
        activeId = entry.id;
        showDetail(entry.id);
    }).catch(function(e) {
        alert('Gagal undo: ' + e.message);
    });
}

function dismissUndoToast() {
    var overlay = document.getElementById('toast-overlay');
    if (overlay) overlay.innerHTML = '';
    deletedTransaction = null;
    if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; }
}

// ====== BATCH DELETE ======
function batchDelete() {
    if (filteredList.length === 0) return;
    if (!confirm('⚠️ Hapus SEMUA ' + filteredList.length + ' transaksi yang terfilter?\n\nData stok TIDAK otomatis kembali.\nTindakan ini tidak dapat dibatalkan!')) return;

    // Delete all filtered transactions
    var batch = {};
    filteredList.forEach(function(entry) {
        batch[entry[0]] = null; // Firebase: set to null to delete
    });

    db.ref('transaksi').update(batch).then(function() {
        activeId = null;
        var detailContent = document.getElementById('detail-content');
        if (detailContent) detailContent.innerHTML = '<div class="detail-empty" style="padding:24px;"><div class="icon">✅</div><p>' + filteredList.length + ' transaksi berhasil dihapus</p></div>';
        closeDetailMobile();
        showToast('✅ ' + filteredList.length + ' transaksi dihapus');
    }).catch(function(e) {
        alert('Gagal hapus: ' + e.message);
    });
}

// ====== TOAST ======
function showToast(message) {
    var overlay = document.getElementById('toast-overlay');
    overlay.innerHTML = '<div class="toast-box"><span>' + message + '</span></div>';
    setTimeout(function() {
        overlay.innerHTML = '';
    }, 3000);
}

function shareWADetail(id) {
    var t = allTransaksi[id];
    if (!t) return;
    var d = new Date(t.timestamp || 0);
    var pad = function(n){ return String(n).padStart(2,'0'); };
    var noStruk = id.slice(-8).toUpperCase();
    var tgl = d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
    var jam = pad(d.getHours()) + ':' + pad(d.getMinutes());
    var pelNama = t.pelanggan_nama || 'Umum';
    var items = t.items || [];

    var lines = [];
    lines.push('🧾 *STRUK PEMBELIAN*');
    lines.push('📅 ' + tgl + ' ' + jam);
    lines.push('🆔 #' + noStruk);
    lines.push('👤 ' + pelNama);
    lines.push('─'.repeat(28));
    items.forEach(function(item, i) {
        var harga = item.price || item.harga_normal || item.harga_grosir || 0;
        lines.push((i+1) + '. ' + item.name);
        lines.push('   ' + (item.qty||0) + ' × Rp ' + harga.toLocaleString('id-ID') + ' = Rp ' + (item.subtotal||0).toLocaleString('id-ID'));
    });
    lines.push('─'.repeat(28));
    lines.push('💰 *TOTAL: Rp ' + (t.total||0).toLocaleString('id-ID') + '*');
    if (t.metode === 'Tunai') {
        lines.push('💵 Bayar: Rp ' + (t.bayar||t.uang_bayar||0).toLocaleString('id-ID'));
        lines.push('🔄 Kembali: Rp ' + (t.kembalian||0).toLocaleString('id-ID'));
    } else {
        lines.push('💳 Metode: ' + (t.metode||'Tunai'));
    }
    lines.push('─'.repeat(28));
    lines.push('✨ Terima kasih! Belanja lagi ya 🛍️');

    var msg = lines.join('\n');
    window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

function printDetail(id) {
    var t = allTransaksi[id];
    if (!t) return;
    var d = new Date(t.timestamp || 0);
    var pad = function(n){ return String(n).padStart(2,'0'); };
    var noStruk = id.slice(-8).toUpperCase();
    var tglStr = pad(d.getDate()) + '-' + pad(d.getMonth()+1) + '-' + d.getFullYear() + '-' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    var pelNama = t.pelanggan_nama || '';
    var items = t.items || [];
    var totalQty = items.reduce(function(s,i){return s + (i.qty||0);}, 0);

    var itemRows = '';
    items.forEach(function(item, i) {
        var parts = [];
        var h = item.price || item.harga_normal || item.harga_grosir || 0;
        parts.push({ name: item.name, qty: item.qty||0, harga: h, sub: item.subtotal||0 });
        parts.forEach(function(p, pi) {
            itemRows += '<tr><td colspan="3" style="padding:2px 0 0;font-size:10px;font-weight:700;text-transform:uppercase;">' + (i+pi+1) + '. ' + p.name + '</td></tr>';
            itemRows += '<tr><td style="padding:0 0 4px;font-size:12px;color:#444;">' + p.qty + ' X ' + p.harga.toLocaleString('id-ID') + '</td><td style="text-align:center;font-size:12px;font-weight:700;">=</td><td style="text-align:right;font-size:12px;font-weight:700;">Rp ' + p.sub.toLocaleString('id-ID') + '</td></tr>';
        });
    });

    var pelLine = pelNama ? '<div style="font-size:11px;margin:2px 0;">Pelanggan: <b>' + pelNama + '</b></div>' : '';
    var metode = t.metode || 'Tunai';
    var metodeRows = metode === 'Tunai'
        ? '<tr><td style="font-size:12px;font-weight:700;">TUNAI</td><td style="text-align:center;font-weight:700;">=</td><td style="text-align:right;font-size:12px;font-weight:700;">Rp ' + (t.bayar||t.uang_bayar||0).toLocaleString('id-ID') + '</td></tr>' +
          '<tr><td style="font-size:12px;font-weight:700;">KEMBALI</td><td style="text-align:center;font-weight:900;">=</td><td style="text-align:right;font-size:12px;font-weight:900;">Rp ' + (t.kembalian||0).toLocaleString('id-ID') + '</td></tr>'
        : '<tr><td style="font-size:12px;font-weight:700;">NET ' + metode.toUpperCase() + '</td><td style="text-align:center;">=</td><td style="text-align:right;font-size:12px;font-weight:800;">Rp ' + (t.total||0).toLocaleString('id-ID') + '</td></tr>';

    var win = window.open('', '_blank', 'width=380,height=650,scrollbars=yes');
    if (!win) {
        alert('Popup diblokir! Izinkan popup untuk mencetak struk.');
        return;
    }
    
    win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Struk #' + noStruk + '</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:"Courier New",Courier,monospace;width:280px;margin:0 auto;padding:14px 6px;font-size:12px;color:#000;background:#fff;}.toko-nama{text-align:center;font-size:15px;font-weight:900;letter-spacing:1px;margin-bottom:2px;}.toko-sub{text-align:center;font-size:10px;color:#555;margin-bottom:6px;}hr.dash2{border:none;margin:5px 0;height:4px;background:none;border-top:1px dashed #000;border-bottom:1px dashed #000;}hr.dot{border:none;border-top:1px dotted #000;margin:5px 0;}table{width:100%;border-collapse:collapse;}.footer-center{text-align:center;font-size:14px;font-weight:900;letter-spacing:3px;margin:8px 0 3px;}.trx-id{text-align:center;font-size:10px;color:#555;}@media print{body{width:280px;padding:4px;}@page{margin:0;size:80mm auto;}}</style></head><body>');
    win.document.write('<div class="toko-nama">' + (tokoConfig.nama||'TOKO ANDA') + '</div><div class="toko-sub">' + (tokoConfig.alamat||'') + (tokoConfig.telepon ? ' · Telp: '+tokoConfig.telepon : '') + '</div>' + pelLine + '<hr class="dash2">' +
        '<table><colgroup><col style="width:auto"><col style="width:40px"><col style="width:80px"></colgroup>' + itemRows +
        '<tr><td colspan="3" style="padding:2px 0;"><hr style="border:none;border-top:1px dashed #000;margin:0;"></td></tr>' +
        '<tr><td style="font-size:12px;font-weight:700;">TOTAL QTY</td><td style="text-align:center;">=</td><td style="text-align:right;font-weight:700;">' + totalQty + '</td></tr>' +
        '<tr><td style="font-size:12px;font-weight:900;">TOTAL</td><td style="text-align:center;font-weight:900;">=</td><td style="text-align:right;font-weight:900;">Rp ' + (t.total||0).toLocaleString('id-ID') + '</td></tr>' +
        metodeRows +
        '</table><hr class="dot">' +
        '<div class="footer-center">' + (tokoConfig.footer||'TERIMA KASIH').toUpperCase() + '</div>' +
        '<div class="trx-id">' + tglStr + '/' + noStruk + '</div></body></html>');
    win.document.close();
    win.focus();
    setTimeout(function(){ win.print(); }, 500);
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
