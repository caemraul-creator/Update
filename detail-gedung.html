<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Lokasi - Inventaris</title>

  <!-- CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="layout.css">

  <style>
    * {
      font-family: 'Inter', sans-serif;
    }

    /* Header lokasi yang simpel */
    .lokasi-header {
      background: white;
      border-radius: 20px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      border: 1px solid #eef2ff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .lokasi-info h3 {
      margin: 0 0 0.25rem 0;
      font-size: 1.3rem;
      font-weight: 600;
    }

    .lokasi-info p {
      margin: 0;
      color: #6b7280;
      font-size: 0.85rem;
    }

    .badge-lokasi {
      background: #eef2ff;
      color: #4f46e5;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    /* Tombol download */
    .btn-download {
      background: #10b981;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-download:hover {
      background: #059669;
      color: white;
    }

    .btn-outline-download {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #374151;
    }

    .btn-outline-download:hover {
      background: #f9fafb;
      border-color: #10b981;
      color: #10b981;
    }

    /* Kartu statistik mini */
    .stats-mini {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .stat-item {
      background: white;
      border-radius: 16px;
      padding: 0.75rem 1.25rem;
      border: 1px solid #eef2ff;
      min-width: 100px;
    }

    .stat-number {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 0.7rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Tabel simpel */
    .table-wrapper {
      background: white;
      border-radius: 20px;
      border: 1px solid #eef2ff;
      overflow: hidden;
    }

    .table-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #f0f2f5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .table-header h5 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
    }

    .btn-sm-custom {
      border-radius: 10px;
      padding: 0.35rem 0.85rem;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .table {
      margin: 0;
      font-size: 0.85rem;
    }

    .table th {
      background: #f8fafc;
      font-weight: 600;
      border-bottom: 1px solid #eef2ff;
    }

    .badge-status {
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    /* Loading & empty */
    .loading-state, .empty-state {
      padding: 3rem;
      text-align: center;
      color: #9ca3af;
    }

    @media (max-width: 768px) {
      .lokasi-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .stat-item {
        flex: 1;
        text-align: center;
      }
    }
  </style>
</head>
<body>
<div class="main-wrapper">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="brand">
      <i class="bi bi-box-seam"></i>
      <h4>Inventaris</h4>
    </div>
    <div class="nav flex-column">
      <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
      <a class="nav-link" href="barang.html"><i class="bi bi-box"></i>Manajemen Barang</a>
      <a class="nav-link active" href="gedung-ruangan.html"><i class="bi bi-building"></i>Gedung & Ruangan</a>
      <a class="nav-link" href="transaksi.html"><i class="bi bi-arrow-left-right"></i>Transaksi / Mutasi</a>
    </div>
  </nav>

  <main class="main-content">
    <!-- Header User -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="d-flex align-items-center gap-2">
        <button type="button" id="btnToggleSidebar" class="btn btn-outline-secondary btn-sm d-md-none">
          <i class="bi bi-list"></i>
        </button>
        <a href="gedung-ruangan.html" class="text-decoration-none text-secondary">
          <i class="bi bi-arrow-left"></i> Kembali
        </a>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span id="userInfo" class="small text-muted"></span>
        <button class="btn btn-sm btn-outline-danger" onclick="doLogout()">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- Header Lokasi Simpel -->
    <div class="lokasi-header">
      <div class="lokasi-info">
        <h3 id="lokasiNama">Memuat...</h3>
        <p id="lokasiDetail"></p>
      </div>
      <div class="d-flex gap-2">
        <button class="btn-outline-download" id="btnDownloadCSV" onclick="downloadCSV()">
          <i class="bi bi-filetype-csv"></i> CSV
        </button>
        <button class="btn-download" id="btnDownloadExcel" onclick="downloadExcel()">
          <i class="bi bi-file-earmark-spreadsheet"></i> Excel
        </button>
      </div>
    </div>

    <!-- Statistik Mini -->
    <div class="stats-mini" id="statsContainer">
      <div class="stat-item">
        <div class="stat-number" id="statTotal">-</div>
        <div class="stat-label">Total Barang</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="statAktif">-</div>
        <div class="stat-label">Aktif</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="statPerawatan">-</div>
        <div class="stat-label">Perawatan</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="statRusak">-</div>
        <div class="stat-label">Rusak</div>
      </div>
    </div>

    <!-- Tabel Barang -->
    <div class="table-wrapper">
      <div class="table-header">
        <h5><i class="bi bi-box me-2"></i>Daftar Barang</h5>
        <div class="d-flex gap-2">
          <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Cari barang..." style="width: 200px;">
        </div>
      </div>
      <div style="overflow-x: auto;">
        <table class="table table-hover" id="barangTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nama Barang</th>
              <th>Kategori</th>
              <th>Merk</th>
              <th>Jumlah</th>
              <th>Satuan</th>
              <th>Status</th>
              <th>Tgl Masuk</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="8" class="loading-state"><i class="bi bi-hourglass-split me-2"></i>Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal Detail -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title">Detail Barang</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Isi dinamis -->
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="layout.js"></script>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxDmu6TqknJafqXa-fqhi4njiOmJ6pG3Dc-2fiOJ6V7Wfl-1SpbZP5-v-n4sHYUwAz/exec';

let currentData = {
  kodeGedung: '',
  namaGedung: '',
  ruangan: '',
  barangList: []
};

function api(action, params = {}) {
  const body = new URLSearchParams({ action });
  const token = localStorage.getItem('token');
  if (token) body.append('token', token);
  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null) body.append(k, v);
  });
  return fetch(GAS_URL, { method: 'POST', body, redirect: 'follow' })
    .then(r => r.json())
    .then(res => {
      if (!res.success) throw new Error(res.error || 'Terjadi kesalahan');
      return res.data;
    });
}

function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
}

function getBadgeStatus(status) {
  const map = {
    'Aktif': 'bg-success',
    'Perawatan': 'bg-warning text-dark',
    'Rusak': 'bg-danger',
    'Tersedia': 'bg-info text-dark'
  };
  const cls = map[status] || 'bg-secondary';
  return `<span class="badge-status ${cls}">${status}</span>`;
}

async function loadData() {
  const urlParams = new URLSearchParams(window.location.search);
  const kodeGedung = urlParams.get('kode') || '';
  const ruangan = urlParams.get('ruangan') || '';

  if (!kodeGedung) {
    document.getElementById('lokasiNama').innerHTML = '<span class="text-danger">Error: Parameter tidak valid</span>';
    return;
  }

  try {
    // Ambil data gedung dan barang
    const [gedungList, barangList] = await Promise.all([
      api('getGedung'),
      api('getBarang')
    ]);

    const gedung = gedungList.find(g => g.kode === kodeGedung);
    const namaGedung = gedung ? gedung.nama : kodeGedung;

    // Filter barang
    let filtered = barangList.filter(b => (b.gedung || '') === kodeGedung);
    
    let judul = namaGedung;
    let subtitle = `${filtered.length} barang`;

    if (ruangan) {
      filtered = filtered.filter(b => (b.ruangan || '') === ruangan);
      judul = `${namaGedung} · ${ruangan}`;
      subtitle = `${filtered.length} barang di ruangan ini`;
    }

    currentData = {
      kodeGedung,
      namaGedung,
      ruangan,
      barangList: filtered
    };

    // Update UI
    document.getElementById('lokasiNama').textContent = judul;
    document.getElementById('lokasiDetail').innerHTML = `<span class="badge-lokasi">${subtitle}</span>`;

    // Update statistik
    const total = filtered.length;
    const aktif = filtered.filter(b => b.status === 'Aktif').length;
    const perawatan = filtered.filter(b => b.status === 'Perawatan').length;
    const rusak = filtered.filter(b => b.status === 'Rusak').length;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statAktif').textContent = aktif;
    document.getElementById('statPerawatan').textContent = perawatan;
    document.getElementById('statRusak').textContent = rusak;

    // Render tabel
    renderTable(filtered);

  } catch (err) {
    console.error(err);
    document.getElementById('tableBody').innerHTML = `<tr><td colspan="8" class="empty-state text-danger">Gagal memuat: ${err.message}</td></tr>`;
  }
}

function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><i class="bi bi-inbox me-2"></i>Tidak ada barang di lokasi ini</td></tr>';
    return;
  }

  tbody.innerHTML = data.map(item => `
    <tr style="cursor: pointer;" onclick="showDetail('${item.id}', '${item.gedung || ''}', '${item.ruangan || ''}')">
      <td><code>${item.id}</code></td>
      <td><strong>${item.nama}</strong></td>
      <td>${item.kategori || '-'}</td>
      <td>${item.merk || '-'}</td>
      <td>${item.jumlah || 1}</td>
      <td>${item.satuan || 'Unit'}</td>
      <td>${getBadgeStatus(item.status)}</td>
      <td>${formatDate(item.tglMasuk)}</td>
    </tr>
  `).join('');
}

function showDetail(id, gedung, ruangan) {
  api('getBarangById', { id, gedung: gedung || '', ruangan: ruangan || '' })
    .then(b => {
      const modalBody = document.getElementById('modalBody');
      modalBody.innerHTML = `
        <table class="table table-sm table-borderless">
          <tr><th width="35%">ID</th><td><code>${b.id}</code></td></tr>
          <tr><th>Nama Barang</th><td><strong>${b.nama}</strong></td></tr>
          <tr><th>Kategori</th><td>${b.kategori || '-'}</td></tr>
          <tr><th>Merk/Model</th><td>${b.merk || '-'}</td></tr>
          <tr><th>Jumlah</th><td>${b.jumlah || 1} ${b.satuan || 'Unit'}</td></tr>
          <tr><th>Gedung</th><td>${b.gedungNama || b.gedung || '-'}</td></tr>
          <tr><th>Ruangan</th><td>${b.ruangan || '-'}</td></tr>
          <tr><th>Tanggal Masuk</th><td>${formatDate(b.tglMasuk)}</td></tr>
          <tr><th>Status</th><td>${getBadgeStatus(b.status)}</td></tr>
          <tr><th>Deskripsi</th><td>${b.deskripsi || '-'}</td></tr>
        </table>
        ${b.foto ? `<div class="text-center mt-2"><img src="${b.foto}" style="max-width:100%; max-height:200px; border-radius:12px;" onclick="window.open(this.src)"></div>` : ''}
      `;
      new bootstrap.Modal(document.getElementById('detailModal')).show();
    })
    .catch(err => alert('Gagal ambil detail: ' + err.message));
}

// Download CSV
function downloadCSV() {
  if (!currentData.barangList.length) {
    alert('Tidak ada data untuk di download');
    return;
  }

  const headers = ['ID', 'Nama Barang', 'Kategori', 'Merk/Model', 'Jumlah', 'Satuan', 'Status', 'Tanggal Masuk', 'Gedung', 'Ruangan', 'Deskripsi'];
  const rows = currentData.barangList.map(b => [
    b.id,
    b.nama,
    b.kategori || '',
    b.merk || '',
    b.jumlah || 1,
    b.satuan || 'Unit',
    b.status || '',
    b.tglMasuk || '',
    currentData.namaGedung,
    currentData.ruangan || b.ruangan || '',
    b.deskripsi || ''
  ]);

  const csvContent = [headers, ...rows].map(row => 
    row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
  ).join('\n');

  const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  
  let filename = `${currentData.namaGedung}`;
  if (currentData.ruangan) filename += `_${currentData.ruangan}`;
  filename += `.csv`;
  
  link.href = url;
  link.setAttribute('download', filename);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

// Download Excel (XLS format - simpel)
function downloadExcel() {
  if (!currentData.barangList.length) {
    alert('Tidak ada data untuk di download');
    return;
  }

  // Buat HTML table untuk export ke Excel
  let html = `
    <html>
    <head>
      <meta charset="UTF-8">
      <title>Data Barang</title>
    </head>
    <body>
      <h3>Laporan Barang - ${currentData.namaGedung}${currentData.ruangan ? ' / ' + currentData.ruangan : ''}</h3>
      <p>Tanggal Export: ${new Date().toLocaleString('id-ID')}</p>
      <table border="1" cellpadding="5" cellspacing="0">
        <thead>
          <tr bgcolor="#f0f0f0">
            <th>ID</th>
            <th>Nama Barang</th>
            <th>Kategori</th>
            <th>Merk/Model</th>
            <th>Jumlah</th>
            <th>Satuan</th>
            <th>Status</th>
            <th>Tanggal Masuk</th>
            <th>Gedung</th>
            <th>Ruangan</th>
            <th>Deskripsi</th>
          </tr>
        </thead>
        <tbody>
  `;

  currentData.barangList.forEach(b => {
    html += `
      <tr>
        <td>${b.id}</td>
        <td>${b.nama}</td>
        <td>${b.kategori || ''}</td>
        <td>${b.merk || ''}</td>
        <td>${b.jumlah || 1}</td>
        <td>${b.satuan || 'Unit'}</td>
        <td>${b.status || ''}</td>
        <td>${b.tglMasuk || ''}</td>
        <td>${currentData.namaGedung}</td>
        <td>${currentData.ruangan || b.ruangan || ''}</td>
        <td>${b.deskripsi || ''}</td>
      </tr>
    `;
  });

  html += `
        </tbody>
      </table>
      <p><small>Generated by Sistem Inventaris</small></p>
    </body>
    </html>
  `;

  const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  
  let filename = `${currentData.namaGedung}`;
  if (currentData.ruangan) filename += `_${currentData.ruangan}`;
  filename += `.xls`;
  
  link.href = url;
  link.setAttribute('download', filename);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

// Search filter
document.getElementById('searchInput')?.addEventListener('keyup', function(e) {
  const keyword = e.target.value.toLowerCase();
  const filtered = currentData.barangList.filter(item => 
    item.id.toLowerCase().includes(keyword) ||
    item.nama.toLowerCase().includes(keyword) ||
    (item.kategori || '').toLowerCase().includes(keyword) ||
    (item.merk || '').toLowerCase().includes(keyword)
  );
  renderTable(filtered);
});

// Cek login
function cekLogin() {
  const token = localStorage.getItem('token');
  if (!token) {
    window.location.href = 'login.html';
    return;
  }
  api('getCurrentUser')
    .then(u => {
      document.getElementById('userInfo').textContent = `${u.nama} (${u.role})`;
      loadData();
    })
    .catch(() => {
      localStorage.clear();
      window.location.href = 'login.html';
    });
}

function doLogout() {
  api('logout').finally(() => {
    localStorage.clear();
    window.location.href = 'login.html';
  });
}

window.onload = cekLogin;
</script>
</body>
</html>
