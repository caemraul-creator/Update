<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Gedung - Inventaris</title>

  <!-- CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Mengasumsikan layout.css ada, jika tidak style default akan berjalan -->
  <link rel="stylesheet" href="layout.css">

  <style>
    * {
      font-family: 'Inter', sans-serif;
    }

    /* --- Layout Umum --- */
    body {
      background-color: #f3f4f6;
      color: #334155;
    }

    .main-wrapper {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: white;
      border-right: 1px solid #e2e8f0;
      padding: 1.5rem;
      position: fixed;
      height: 100vh;
      z-index: 100;
      transition: transform 0.3s ease;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      color: #4f46e5;
      font-weight: 700;
      font-size: 1.25rem;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      color: #64748b;
      border-radius: 8px;
      margin-bottom: 0.25rem;
      text-decoration: none;
      transition: all 0.2s;
    }

    .nav-link:hover, .nav-link.active {
      background-color: #eef2ff;
      color: #4f46e5;
      font-weight: 500;
    }

    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 2rem;
      transition: margin-left 0.3s ease;
    }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.active { transform: translateX(0); }
      .main-content { margin-left: 0; padding: 1rem; }
    }

    /* --- Hero Section --- */
    .hero-gedung {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
    }

    .hero-gedung h2 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .hero-gedung p {
      margin: 0.5rem 0 0 0;
      opacity: 0.9;
      font-size: 0.95rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .hero-gedung p span {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-back {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 8px;
      padding: 0.4rem 1rem;
      text-decoration: none;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s;
      margin-bottom: 0.5rem;
    }

    .btn-back:hover {
      background: rgba(255,255,255,0.3);
      color: white;
    }

    .btn-print-all {
      background: white;
      color: #4f46e5;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.25rem;
      font-weight: 600;
      font-size: 0.9rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      transition: transform 0.1s;
    }
    
    .btn-print-all:active { transform: scale(0.98); }
    .btn-print-all:hover { background: #f8fafc; color: #4338ca; }

    /* --- Kartu Ruangan --- */
    .ruangan-card {
      background: white;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
      overflow: hidden;
      transition: all 0.2s;
    }

    .ruangan-header {
      padding: 1.25rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      background: #fff;
      border-bottom: 1px solid transparent;
      transition: background 0.2s;
    }

    .ruangan-header:hover {
      background: #f8fafc;
    }

    .ruangan-title h4 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .ruangan-title h4 i {
      color: #94a3b8;
      font-size: 1rem;
    }

    /* Baris Statistik (Baru) */
    .stats-strip {
      padding: 0.75rem 1.5rem;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .stat-item {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
    }

    .stat-total { background: #e0e7ff; color: #4338ca; }
    .stat-aktif { background: #dcfce7; color: #15803d; }
    .stat-perawatan { background: #fef3c7; color: #b45309; }
    .stat-rusak { background: #fee2e2; color: #b91c1c; }

    .ruangan-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .btn-icon {
      background: white;
      border: 1px solid #cbd5e1;
      color: #64748b;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-icon:hover {
      border-color: #4f46e5;
      color: #4f46e5;
    }

    .btn-print-ruangan {
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      color: #475569;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-print-ruangan:hover {
      border-color: #10b981;
      color: #10b981;
      background: #ecfdf5;
    }

    /* Tabel & Body */
    .ruangan-body {
      display: none;
    }
    .ruangan-body.show { display: block; }

    .table-barang {
      width: 100%;
      font-size: 0.85rem;
      border-collapse: collapse;
      margin-bottom: 0;
    }

    .table-barang th {
      background: #fff;
      padding: 1rem 1.5rem;
      font-weight: 600;
      color: #64748b;
      border-bottom: 2px solid #f1f5f9;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .table-barang td {
      padding: 0.85rem 1.5rem;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
      color: #334155;
    }
    
    .table-barang tr:last-child td { border-bottom: none; }

    /* Table Footer (Pindah ke sini agar indah) */
    .table-barang tfoot td {
      background: #f8fafc;
      font-weight: 700;
      color: #1e293b;
      padding: 1rem 1.5rem;
      text-align: right;
      border-top: 2px solid #e2e8f0;
    }

    .badge-status {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-aktif { background: #dcfce7; color: #15803d; }
    .badge-perawatan { background: #fef3c7; color: #b45309; }
    .badge-rusak { background: #fee2e2; color: #b91c1c; }

    .btn-foto {
      background: #f1f5f9;
      border: none;
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      font-size: 0.75rem;
      cursor: pointer;
      color: #475569;
      transition: all 0.2s;
    }

    .btn-foto:hover {
      background: #4f46e5;
      color: white;
    }

    /* Modal */
    .modal-foto {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      cursor: pointer;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
    }
    .modal-foto img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 12px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }
    .modal-foto.show { display: flex; animation: fadeIn 0.2s; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* --- PRINT STYLES --- */
    @media print {
      @page {
        size: A4 landscape;
        margin: 10mm 15mm 20mm 15mm;
      }
      body {
        background: white;
        padding: 0;
        margin: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .sidebar, .btn-back, .btn-print-all, .btn-print-ruangan, .btn-icon,
      #userInfo, .btn-outline-danger, #btnToggleSidebar, .btn-foto, .hero-gedung .btn-back {
        display: none !important;
      }
      .main-content { margin-left: 0 !important; padding: 0 !important; width: 100%; }
      
      .hero-gedung {
        background: none;
        color: black;
        padding: 0;
        margin-bottom: 30px;
        border-bottom: 2px solid #4f46e5;
        display: block;
        box-shadow: none;
        text-align: center;
      }
      .hero-gedung h2 { font-size: 24pt; margin-bottom: 5px; color: #000; }
      .hero-gedung p { color: #555; justify-content: center; font-size: 11pt; }
      .hero-gedung p i { display: none; } /* Hide icons in print header */

      .ruangan-card {
        box-shadow: none;
        border: none;
        margin-bottom: 30px;
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .ruangan-header, .ruangan-actions { display: none; } /* Hide collapsible header UI */
      .stats-strip { 
        display: flex !important; 
        background: #f0f0f0; 
        border: 1px solid #ccc;
        margin-bottom: 10px;
        padding: 10px;
      }
      
      .ruangan-body { display: block !important; }
      
      .table-barang { font-size: 10pt; width: 100%; }
      .table-barang th { 
        background: #eee !important; 
        color: #000 !important; 
        border: 1px solid #999;
        padding: 8px;
      }
      .table-barang td { 
        border: 1px solid #ddd; 
        padding: 6px 8px; 
      }
      
      .table-barang tfoot td {
        background: #eee !important;
        border: 1px solid #999;
        border-top: 2px solid #000;
      }

      /* Footer Print */
      .print-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        text-align: center;
        font-size: 8pt;
        color: #999;
        border-top: 1px solid #eee;
        padding-top: 5px;
      }
      
      /* Signature Block in Print (Simulated via JS injection usually, but here we rely on the window.print() content) */
    }
    
    .print-footer { display: none; } /* Hidden on screen */

    .loading-state, .empty-state { padding: 4rem; text-align: center; color: #94a3b8; }
  </style>
</head>

<div id="modalFoto" class="modal-foto" onclick="closeModalFoto()">
  <img id="modalFotoImg" src="" alt="Foto Barang">

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="layout.js"></script>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxDmu6TqknJafqXa-fqhi4njiOmJ6pG3Dc-2fiOJ6V7Wfl-1SpbZP5-v-n4sHYUwAz/exec';

let currentGedung = { kode: '', nama: '', ruanganList: [] };
let currentUser = { nama: '', role: '' };

// Helper: Tanggal Waktu
function getCurrentDateTime() {
  const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
  const now = new Date();
  const dayName = days[now.getDay()];
  const date = now.getDate().toString().padStart(2, '0');
  const month = (now.getMonth() + 1).toString().padStart(2, '0');
  const year = now.getFullYear();
  const hours = now.getHours().toString().padStart(2, '0');
  const minutes = now.getMinutes().toString().padStart(2, '0');
  return `${dayName}, ${date}/${month}/${year} ${hours}:${minutes}`;
}

// Helper: API Wrapper
function api(action, params = {}) {
  const body = new URLSearchParams({ action });
  const token = localStorage.getItem('token');
  if (token) body.append('token', token);
  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null) body.append(k, v);
  });
  return fetch(GAS_URL, { method: 'POST', body, redirect: 'follow' })
    .then(r => r.json())
    .then(res => {
      if (!res.success) throw new Error(res.error || 'Terjadi kesalahan');
      return res.data;
    });
}

// Helper: Format Tanggal
function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
}

// Helper: Badge Status
function getBadge(status) {
  if (status === 'Aktif') return '<span class="badge-status badge-aktif">Aktif</span>';
  if (status === 'Perawatan') return '<span class="badge-status badge-perawatan">Perawatan</span>';
  if (status === 'Rusak') return '<span class="badge-status badge-rusak">Rusak</span>';
  return `<span class="badge-status" style="background:#e2e8f0;color:#475569">${status}</span>`;
}

// Modal Logic
function showFoto(fotoUrl) {
  if (!fotoUrl || fotoUrl === '-') {
    alert('Tidak ada foto untuk barang ini');
    return;
  }
  const modal = document.getElementById('modalFoto');
  const img = document.getElementById('modalFotoImg');
  img.src = fotoUrl;
  modal.classList.add('show');
}

function closeModalFoto() {
  document.getElementById('modalFoto').classList.remove('show');
  setTimeout(() => { document.getElementById('modalFotoImg').src = ''; }, 200);
}

// Main Load Logic
async function loadData() {
  const urlParams = new URLSearchParams(window.location.search);
  const kodeGedung = urlParams.get('kode') || '';

  if (!kodeGedung) {
    document.getElementById('gedungNama').innerHTML = '<span class="text-danger">Error: Parameter tidak valid</span>';
    document.getElementById('ruanganContainer').innerHTML = '<div class="empty-state">Kode gedung tidak ditemukan</div>';
    return;
  }

  try {
    const [gedungList, barangList, ruanganList] = await Promise.all([
      api('getGedung'),
      api('getBarang'),
      api('getRuangan')
    ]);

    const gedung = gedungList.find(g => g.kode === kodeGedung);
    if (!gedung) {
      document.getElementById('gedungNama').innerHTML = '<span class="text-danger">Gedung tidak ditemukan</span>';
      return;
    }

    currentGedung.kode = gedung.kode;
    currentGedung.nama = gedung.nama;

    // Filter Barang di Gedung Ini
    const barangDiGedung = barangList.filter(b => (b.gedung || '') === kodeGedung);

    // Kumpulkan Nama Ruangan Unik
    const ruanganSet = new Set();
    barangDiGedung.forEach(b => {
      if (b.ruangan && b.ruangan.trim()) ruanganSet.add(b.ruangan);
    });
    
    // Tambah ruangan dari master data jika belum ada
    (ruanganList || [])
      .filter(r => (r.kodeGedung || r.gedungKode || r.kode_gedung || '') === kodeGedung)
      .forEach(r => {
        const nama = r.nama || r.nama_ruangan || '';
        if(nama.trim()) ruanganSet.add(nama);
      });
    
    let daftarRuangan = Array.from(ruanganSet).sort();
    if (daftarRuangan.length === 0 && barangDiGedung.length > 0) daftarRuangan = ['Lainnya'];

    // Proses Data per Ruangan
    const ruanganData = daftarRuangan.map(ruang => {
      const barang = barangDiGedung.filter(b => (b.ruangan || 'Lainnya') === ruang);
      const total = barang.reduce((sum, b) => sum + (parseInt(b.jumlah) || 1), 0);
      const aktif = barang.filter(b => b.status === 'Aktif').reduce((sum, b) => sum + (parseInt(b.jumlah) || 1), 0);
      const perawatan = barang.filter(b => b.status === 'Perawatan').reduce((sum, b) => sum + (parseInt(b.jumlah) || 1), 0);
      const rusak = barang.filter(b => b.status === 'Rusak').reduce((sum, b) => sum + (parseInt(b.jumlah) || 1), 0);
      
      return {
        nama: ruang,
        barang: barang,
        stats: { total, aktif, perawatan, rusak, jenis: barang.length }
      };
    });

    currentGedung.ruanganList = ruanganData;

    // Update Header
    const totalBarangGedung = barangDiGedung.reduce((sum, b) => sum + (parseInt(b.jumlah) || 1), 0);
    document.getElementById('gedungNama').textContent = gedung.nama;
    document.getElementById('gedungInfo').innerHTML = `
      <span><i class="bi bi-building"></i> ${gedung.kode}</span>
      <span><i class="bi bi-box-seam"></i> ${totalBarangGedung} Barang</span>
      <span><i class="bi bi-door-open"></i> ${ruanganData.length} Ruangan</span>
    `;

    renderRuanganCards(ruanganData);

  } catch (err) {
    console.error(err);
    document.getElementById('ruanganContainer').innerHTML = `
      <div class="empty-state text-danger">
        <i class="bi bi-exclamation-triangle fs-3"></i>
        <p class="mt-2">Gagal memuat data: ${err.message}</p>
      </div>
    `;
  }
}

// Render Cards (Revised for Layout)
function renderRuanganCards(ruanganData) {
  const container = document.getElementById('ruanganContainer');
  if (ruanganData.length === 0) {
    container.innerHTML = `<div class="empty-state"><i class="bi bi-inbox fs-2"></i><p class="mt-2">Belum ada barang di gedung ini</p></div>`;
    return;
  }

  container.innerHTML = '';
  
  ruanganData.forEach((ruang, idx) => {
    const cardId = `ruangan_${idx}`;
    const showClass = idx === 0 ? 'show' : '';
    const iconRotate = idx === 0 ? 'rotate-180' : '';
    
    // Generate Baris Tabel
    const barangRows = ruang.barang.map((b, no) => {
      const fotoHtml = b.foto ? 
        `<button class="btn-foto" onclick="event.stopPropagation(); showFoto('${b.foto.replace(/'/g, "\\'")}')">
           <i class="bi bi-image"></i> Foto
         </button>` : '-';
      
      return `
        <tr>
          <td>${no + 1}</td>
          <td class="text-muted small">${b.id}</td>
          <td class="fw-medium text-dark">${b.nama}</td>
          <td>${b.kategori || '-'}</td>
          <td>${b.merk || '-'}</td>
          <td class="text-center">${b.jumlah || 1}</td>
          <td>${b.satuan || 'Unit'}</td>
          <td>${getBadge(b.status)}</td>
          <td class="small text-muted">${formatDate(b.tglMasuk)}</td>
          <td class="text-center">${fotoHtml}</td>
        </tr>
      `;
    }).join('');
    
    // HTML Card dengan Struktur Baru
    // 1. Header (Title + Actions)
    // 2. Stats Strip (Baris Data Ringkasan)
    // 3. Table + Tfoot (Total)
    const cardHtml = `
      <div class="ruangan-card" id="card_${cardId}">
        <div class="ruangan-header" onclick="toggleRuangan('${cardId}')">
          <div class="ruangan-title">
            <h4>
              <i class="bi bi-door-closed"></i>
              ${ruang.nama}

          </div>
          <div class="ruangan-actions">
            <button class="btn-print-ruangan" onclick="event.stopPropagation(); printRuangan('${ruang.nama}', ${JSON.stringify(ruang.barang).replace(/"/g, '&quot;')})">

            </button>
            <button class="btn-icon" id="icon_${cardId}">
              <i class="bi bi-chevron-down ${iconRotate}"></i>
            </button>
          </div>
        </div>
        
        <div class="ruangan-body ${showClass}" id="body_${cardId}">
          <!-- STATS STRIP -->
          <div class="stats-strip">
            <div class="stat-item stat-total">
              <i class="bi bi-box-seam"></i> Total: ${ruang.stats.total}
            </div>
            <div class="stat-item stat-aktif">
              <i class="bi bi-check-circle"></i> Aktif: ${ruang.stats.aktif}
            </div>
            <div class="stat-item stat-perawatan">
              <i class="bi bi-tools"></i> Perawatan: ${ruang.stats.perawatan}
            </div>
            <div class="stat-item stat-rusak">
              <i class="bi bi-x-circle"></i> Rusak: ${ruang.stats.rusak}
            </div>
          </div>

          <!-- TABEL -->
          <table class="table-barang">
            <thead>
              <tr>
                <th style="width: 40px;">No</th>
                <th style="width: 80px;">ID</th>
                <th>Nama Barang</th>
                <th>Kategori</th>
                <th>Merk</th>
                <th class="text-center" style="width: 60px;">Jml</th>
                <th style="width: 80px;">Satuan</th>
                <th style="width: 100px;">Status</th>
                <th style="width: 90px;">Tgl Masuk</th>
                <th class="text-center" style="width: 70px;">Foto</th>
              </tr>
            </thead>
            <tbody>
              ${barangRows || '<tr><td colspan="10" class="text-center text-muted py-4">Belum ada barang</td></tr>'}
            </tbody>
            <!-- TFOOT: TOTAL DI SINI -->
            <tfoot>
              <tr>
                <td colspan="10">
                  Total Barang: <span class="text-primary">${ruang.stats.total}</span> ${ruang.barang[0]?.satuan || 'unit'}
                </td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    `;
    container.insertAdjacentHTML('beforeend', cardHtml);
  });
}

// Toggle Logic
function toggleRuangan(cardId) {
  const body = document.getElementById(`body_${cardId}`);
  const icon = document.querySelector(`#icon_${cardId} i`);
  
  if (body.classList.contains('show')) {
    body.classList.remove('show');
    if (icon) icon.style.transform = 'rotate(0deg)';
  } else {
    body.classList.add('show');
    if (icon) icon.style.transform = 'rotate(180deg)';
  }
}

// Auth & Init
function cekLogin() {
  const token = localStorage.getItem('token');
  if (!token) { window.location.href = 'login.html'; return; }
  api('getCurrentUser')
    .then(u => {
      currentUser = u;
      document.getElementById('userInfo').textContent = `${u.nama} (${u.role})`;
      loadData();
    })
    .catch(() => {
      localStorage.clear();
      window.location.href = 'login.html';
    });
}

function doLogout() {
  api('logout').finally(() => {
    localStorage.clear();
    window.location.href = 'login.html';
  });
}

// UI Mobile Sidebar
document.getElementById('btnToggleSidebar')?.addEventListener('click', () => {

});

window.onload = cekLogin;
