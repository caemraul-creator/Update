<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Gedung - Inventaris</title>

  <!-- CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="layout.css">

  <style>
    * {
      font-family: 'Inter', sans-serif;
    }

    /* Header Gedung */
    .hero-gedung {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 24px;
      padding: 1.5rem 2rem;
      margin-bottom: 1.5rem;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .hero-gedung h2 {
      margin: 0 0 0.25rem 0;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .hero-gedung p {
      margin: 0;
      opacity: 0.85;
      font-size: 0.85rem;
    }

    .btn-back {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      border-radius: 12px;
      padding: 0.5rem 1rem;
    }

    .btn-back:hover {
      background: rgba(255,255,255,0.3);
      color: white;
    }

    /* Kartu Ruangan */
    .ruangan-card {
      background: white;
      border-radius: 20px;
      border: 1px solid #eef2ff;
      margin-bottom: 1.5rem;
      overflow: hidden;
      transition: all 0.2s;
    }

    .ruangan-header {
      background: #f8fafc;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #eef2ff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      cursor: pointer;
    }

    .ruangan-header h4 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .ruangan-header h4 i {
      color: #667eea;
    }

    .ruangan-stats {
      display: flex;
      gap: 1rem;
      font-size: 0.75rem;
    }

    .ruangan-stats span {
      background: #eef2ff;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      color: #4f46e5;
    }

    .btn-print-ruangan {
      background: none;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 0.3rem 0.8rem;
      font-size: 0.7rem;
      transition: all 0.2s;
    }

    .btn-print-ruangan:hover {
      background: #10b981;
      border-color: #10b981;
      color: white;
    }

    /* Tabel dalam ruangan */
    .ruangan-body {
      padding: 0;
      display: none;
    }

    .ruangan-body.show {
      display: block;
    }

    .table-barang {
      width: 100%;
      font-size: 0.8rem;
    }

    .table-barang th {
      background: #ffffff;
      padding: 0.75rem 1rem;
      font-weight: 600;
      border-bottom: 1px solid #eef2ff;
    }

    .table-barang td {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #f1f5f9;
    }

    .badge-status {
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    .badge-aktif { background: #10b981; color: white; }
    .badge-perawatan { background: #f59e0b; color: white; }
    .badge-rusak { background: #ef4444; color: white; }

    /* Tombol umum */
    .btn-print-all {
      background: #1e293b;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.5rem 1.2rem;
      font-size: 0.85rem;
    }

    .btn-print-all:hover {
      background: #0f172a;
      color: white;
    }

    /* Mode Cetak */
    @media print {
      body {
        background: white;
        padding: 0;
        margin: 0;
      }
      .sidebar, .btn-back, .btn-print-all, .btn-print-ruangan, .ruangan-header .bi-chevron-down, 
      #userInfo, .btn-outline-danger, .btnToggleSidebar {
        display: none !important;
      }
      .main-content {
        margin-left: 0 !important;
        padding: 0 !important;
      }
      .hero-gedung {
        background: #4f46e5;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .ruangan-body {
        display: block !important;
      }
      .ruangan-card {
        break-inside: avoid;
        page-break-inside: avoid;
        border: 1px solid #ddd;
        margin-bottom: 1rem;
      }
      .ruangan-header {
        background: #f0f0f0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .table-barang {
        font-size: 9pt;
      }
    }

    /* Loading & Empty */
    .loading-state, .empty-state {
      padding: 3rem;
      text-align: center;
      color: #9ca3af;
    }

    .total-footer {
      background: #f8fafc;
      padding: 0.75rem 1.5rem;
      text-align: right;
      font-weight: 600;
      border-top: 1px solid #eef2ff;
    }
  </style>
</head>
<body>
<div class="main-wrapper">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="brand">
      <i class="bi bi-box-seam"></i>
      <h4>Inventaris</h4>
    </div>
    <div class="nav flex-column">
      <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
      <a class="nav-link" href="barang.html"><i class="bi bi-box"></i>Manajemen Barang</a>
      <a class="nav-link active" href="gedung-ruangan.html"><i class="bi bi-building"></i>Gedung & Ruangan</a>
      <a class="nav-link" href="transaksi.html"><i class="bi bi-arrow-left-right"></i>Transaksi / Mutasi</a>
    </div>
  </nav>

  <main class="main-content">
    <!-- Header User -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="d-flex align-items-center gap-2">
        <button type="button" id="btnToggleSidebar" class="btn btn-outline-secondary btn-sm d-md-none">
          <i class="bi bi-list"></i>
        </button>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span id="userInfo" class="small text-muted"></span>
        <button class="btn btn-sm btn-outline-danger" onclick="doLogout()">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- Hero Gedung -->
    <div class="hero-gedung">
      <div>
        <a href="gedung-ruangan.html" class="btn-back btn-sm">
          <i class="bi bi-arrow-left"></i> Kembali
        </a>
        <h2 id="gedungNama" class="mt-2">Memuat...</h2>
        <p id="gedungInfo"></p>
      </div>
      <button class="btn-print-all" onclick="printSemuaRuangan()">
        <i class="bi bi-printer"></i> Cetak Semua Ruangan
      </button>
    </div>

    <!-- Kontainer Ruangan -->
    <div id="ruanganContainer">
      <div class="loading-state">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2">Memuat data ruangan...</p>
      </div>
    </div>
  </main>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="layout.js"></script>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxDmu6TqknJafqXa-fqhi4njiOmJ6pG3Dc-2fiOJ6V7Wfl-1SpbZP5-v-n4sHYUwAz/exec';

let currentGedung = {
  kode: '',
  nama: '',
  ruanganList: []
};

function api(action, params = {}) {
  const body = new URLSearchParams({ action });
  const token = localStorage.getItem('token');
  if (token) body.append('token', token);
  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null) body.append(k, v);
  });
  return fetch(GAS_URL, { method: 'POST', body, redirect: 'follow' })
    .then(r => r.json())
    .then(res => {
      if (!res.success) throw new Error(res.error || 'Terjadi kesalahan');
      return res.data;
    });
}

function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
}

function getBadge(status) {
  if (status === 'Aktif') return '<span class="badge-status badge-aktif">Aktif</span>';
  if (status === 'Perawatan') return '<span class="badge-status badge-perawatan">Perawatan</span>';
  if (status === 'Rusak') return '<span class="badge-status badge-rusak">Rusak</span>';
  return `<span class="badge-status" style="background:#94a3b8;color:white">${status}</span>`;
}

async function loadData() {
  const urlParams = new URLSearchParams(window.location.search);
  const kodeGedung = urlParams.get('kode') || '';

  if (!kodeGedung) {
    document.getElementById('gedungNama').innerHTML = '<span class="text-danger">Error: Parameter tidak valid</span>';
    document.getElementById('ruanganContainer').innerHTML = '<div class="empty-state">Kode gedung tidak ditemukan</div>';
    return;
  }

  try {
    // Ambil data gedung, barang, dan ruangan
    const [gedungList, barangList, ruanganList] = await Promise.all([
      api('getGedung'),
      api('getBarang'),
      api('getRuangan')
    ]);

    const gedung = gedungList.find(g => g.kode === kodeGedung);
    if (!gedung) {
      document.getElementById('gedungNama').innerHTML = '<span class="text-danger">Gedung tidak ditemukan</span>';
      return;
    }

    currentGedung.kode = gedung.kode;
    currentGedung.nama = gedung.nama;

    // Filter barang berdasarkan gedung
    const barangDiGedung = barangList.filter(b => (b.gedung || '') === kodeGedung);

    // Dapatkan daftar ruangan unik dari barang di gedung ini
    const ruanganSet = new Set();
    barangDiGedung.forEach(b => {
      if (b.ruangan && b.ruangan.trim()) {
        ruanganSet.add(b.ruangan);
      }
    });
    
    // Juga ambil ruangan dari data master ruangan
    const ruanganDariMaster = (ruanganList || [])
      .filter(r => (r.kodeGedung || r.gedungKode || r.kode_gedung || '') === kodeGedung)
      .map(r => r.nama || r.nama_ruangan || '')
      .filter(n => n.trim());
    
    ruanganDariMaster.forEach(r => ruanganSet.add(r));

    let daftarRuangan = Array.from(ruanganSet).sort();
    
    // Jika tidak ada ruangan, buat default "Lainnya"
    if (daftarRuangan.length === 0 && barangDiGedung.length > 0) {
      daftarRuangan = ['Lainnya'];
    }

    // Kelompokkan barang per ruangan
    const ruanganData = daftarRuangan.map(ruang => {
      const barang = barangDiGedung.filter(b => (b.ruangan || 'Lainnya') === ruang);
      const total = barang.length;
      const aktif = barang.filter(b => b.status === 'Aktif').length;
      const perawatan = barang.filter(b => b.status === 'Perawatan').length;
      const rusak = barang.filter(b => b.status === 'Rusak').length;
      
      return {
        nama: ruang,
        barang: barang,
        stats: { total, aktif, perawatan, rusak }
      };
    });

    // Tambahkan ruangan yang tidak punya barang? skip saja

    currentGedung.ruanganList = ruanganData;

    // Update hero
    const totalBarang = barangDiGedung.length;
    document.getElementById('gedungNama').textContent = gedung.nama;
    document.getElementById('gedungInfo').innerHTML = `
      <i class="bi bi-building"></i> ${gedung.kode} | 
      <i class="bi bi-box"></i> ${totalBarang} barang | 
      <i class="bi bi-door-open"></i> ${ruanganData.length} ruangan
    `;

    // Render kartu ruangan
    renderRuanganCards(ruanganData);

  } catch (err) {
    console.error(err);
    document.getElementById('ruanganContainer').innerHTML = `
      <div class="empty-state text-danger">
        <i class="bi bi-exclamation-triangle fs-3"></i>
        <p class="mt-2">Gagal memuat data: ${err.message}</p>
      </div>
    `;
  }
}

function renderRuanganCards(ruanganData) {
  const container = document.getElementById('ruanganContainer');
  
  if (ruanganData.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <i class="bi bi-inbox fs-2"></i>
        <p class="mt-2">Belum ada barang di gedung ini</p>
      </div>
    `;
    return;
  }

  container.innerHTML = '';
  
  ruanganData.forEach((ruang, idx) => {
    const cardId = `ruangan_${idx}`;
    const showClass = idx === 0 ? 'show' : ''; // Ruangan pertama terbuka
    
    const barangRows = ruang.barang.map(b => `
      <tr>
        <td>${b.id}</td>
        <td><strong>${b.nama}</strong></td>
        <td>${b.kategori || '-'}</td>
        <td>${b.merk || '-'}</td>
        <td>${b.jumlah || 1}</td>
        <td>${b.satuan || 'Unit'}</td>
        <td>${getBadge(b.status)}</td>
        <td>${formatDate(b.tglMasuk)}</td>
      </tr>
    `).join('');
    
    const cardHtml = `
      <div class="ruangan-card" id="card_${cardId}">
        <div class="ruangan-header" onclick="toggleRuangan('${cardId}')">
          <h4>
            <i class="bi bi-door-open"></i>
            ${ruang.nama}
            <i class="bi bi-chevron-down" id="icon_${cardId}" style="font-size:0.8rem;"></i>
          </h4>
          <div class="d-flex align-items-center gap-3">
            <div class="ruangan-stats">
              <span><i class="bi bi-box"></i> ${ruang.stats.total}</span>
              <span class="text-success"><i class="bi bi-check-circle"></i> ${ruang.stats.aktif}</span>
              <span class="text-warning"><i class="bi bi-exclamation-triangle"></i> ${ruang.stats.perawatan}</span>
              <span class="text-danger"><i class="bi bi-x-circle"></i> ${ruang.stats.rusak}</span>
            </div>
            <button class="btn-print-ruangan" onclick="event.stopPropagation(); printRuangan('${cardId}', '${ruang.nama}')">
              <i class="bi bi-printer"></i> Cetak
            </button>
          </div>
        </div>
        <div class="ruangan-body ${showClass}" id="body_${cardId}">
          <table class="table-barang">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nama Barang</th>
                <th>Kategori</th>
                <th>Merk</th>
                <th>Jumlah</th>
                <th>Satuan</th>
                <th>Status</th>
                <th>Tgl Masuk</th>
              </tr>
            </thead>
            <tbody>
              ${barangRows || '<tr><td colspan="8" class="text-center text-muted">Belum ada barang</td></tr>'}
            </tbody>
          </table>
          <div class="total-footer">
            Total: ${ruang.stats.total} barang
          </div>
        </div>
      </div>
    `;
    
    container.insertAdjacentHTML('beforeend', cardHtml);
  });
}

function toggleRuangan(cardId) {
  const body = document.getElementById(`body_${cardId}`);
  const icon = document.getElementById(`icon_${cardId}`);
  
  if (body.classList.contains('show')) {
    body.classList.remove('show');
    icon.style.transform = 'rotate(0deg)';
  } else {
    body.classList.add('show');
    icon.style.transform = 'rotate(180deg)';
  }
}

function printRuangan(cardId, ruanganNama) {
  const bodyElement = document.getElementById(`body_${cardId}`);
  const originalContent = bodyElement.innerHTML;
  const headerContent = document.querySelector('.hero-gedung').cloneNode(true);
  
  // Sembunyikan tombol print di clone header
  const printBtn = headerContent.querySelector('.btn-print-all');
  if (printBtn) printBtn.style.display = 'none';
  
  const printWindow = window.open('', '_blank');
  printWindow.document.write(`
    <!DOCTYPE html>
    <html>
    <head>
      <title>Cetak - ${currentGedung.nama} - ${ruanganNama}</title>
      <style>
        body {
          font-family: 'Inter', system-ui, sans-serif;
          padding: 20px;
          margin: 0;
        }
        .print-header {
          margin-bottom: 20px;
          padding-bottom: 15px;
          border-bottom: 2px solid #667eea;
        }
        .print-header h2 {
          margin: 0 0 5px 0;
          color: #1e293b;
        }
        .print-header p {
          margin: 0;
          color: #64748b;
          font-size: 14px;
        }
        table {
          width: 100%;
          border-collapse: collapse;
          font-size: 12px;
        }
        th, td {
          border: 1px solid #ddd;
          padding: 8px;
          text-align: left;
        }
        th {
          background: #f1f5f9;
          font-weight: 600;
        }
        .total-footer {
          margin-top: 15px;
          text-align: right;
          font-weight: bold;
          padding: 10px;
          background: #f8fafc;
        }
        .badge-status {
          padding: 2px 8px;
          border-radius: 12px;
          font-size: 11px;
          color: white;
        }
        .badge-aktif { background: #10b981; }
        .badge-perawatan { background: #f59e0b; }
        .badge-rusak { background: #ef4444; }
        @media print {
          body { padding: 0; }
        }
      </style>
    </head>
    <body>
      <div class="print-header">
        <h2>${currentGedung.nama}</h2>
        <p><strong>Ruangan:</strong> ${ruanganNama} | <strong>Tanggal Cetak:</strong> ${new Date().toLocaleString('id-ID')}</p>
      </div>
      ${bodyElement.outerHTML}
    </body>
    </html>
  `);
  printWindow.document.close();
  printWindow.print();
}

function printSemuaRuangan() {
  const container = document.getElementById('ruanganContainer');
  const originalHtml = container.innerHTML;
  
  const printWindow = window.open('', '_blank');
  printWindow.document.write(`
    <!DOCTYPE html>
    <html>
    <head>
      <title>Cetak Semua - ${currentGedung.nama}</title>
      <style>
        body {
          font-family: 'Inter', system-ui, sans-serif;
          padding: 20px;
          margin: 0;
        }
        .print-header {
          margin-bottom: 20px;
          padding-bottom: 15px;
          border-bottom: 2px solid #667eea;
          text-align: center;
        }
        .print-header h2 {
          margin: 0 0 5px 0;
          color: #1e293b;
        }
        .print-header p {
          margin: 0;
          color: #64748b;
        }
        .ruangan-card {
          margin-bottom: 30px;
          break-inside: avoid;
          page-break-inside: avoid;
          border: 1px solid #e2e8f0;
          border-radius: 8px;
          overflow: hidden;
        }
        .ruangan-header {
          background: #f1f5f9;
          padding: 10px 15px;
          border-bottom: 1px solid #e2e8f0;
        }
        .ruangan-header h4 {
          margin: 0;
          font-size: 16px;
        }
        .ruangan-body {
          display: block !important;
        }
        table {
          width: 100%;
          border-collapse: collapse;
          font-size: 11px;
        }
        th, td {
          border: 1px solid #ddd;
          padding: 6px 8px;
          text-align: left;
        }
        th {
          background: #f8fafc;
          font-weight: 600;
        }
        .total-footer {
          padding: 8px 15px;
          text-align: right;
          font-weight: bold;
          background: #f8fafc;
          border-top: 1px solid #e2e8f0;
        }
        .badge-status {
          padding: 2px 8px;
          border-radius: 12px;
          font-size: 10px;
          color: white;
        }
        .badge-aktif { background: #10b981; }
        .badge-perawatan { background: #f59e0b; }
        .badge-rusak { background: #ef4444; }
        @media print {
          body { padding: 0; }
          .ruangan-card {
            break-inside: avoid;
          }
        }
      </style>
    </head>
    <body>
      <div class="print-header">
        <h2>${currentGedung.nama}</h2>
        <p>Laporan Inventaris Barang | Tanggal Cetak: ${new Date().toLocaleString('id-ID')}</p>
      </div>
      ${originalHtml}
    </body>
    </html>
  `);
  printWindow.document.close();
  printWindow.print();
}

// Cek login
function cekLogin() {
  const token = localStorage.getItem('token');
  if (!token) {
    window.location.href = 'login.html';
    return;
  }
  api('getCurrentUser')
    .then(u => {
      document.getElementById('userInfo').textContent = `${u.nama} (${u.role})`;
      loadData();
    })
    .catch(() => {
      localStorage.clear();
      window.location.href = 'login.html';
    });
}

function doLogout() {
  api('logout').finally(() => {
    localStorage.clear();
    window.location.href = 'login.html';
  });
}

window.onload = cekLogin;
</script>
</body>
</html>
