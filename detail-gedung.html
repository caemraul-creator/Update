<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Gedung - Inventaris</title>

  <!-- CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Asumsi layout.css ada, tapi kita timpa style penting di bawah -->
  <link rel="stylesheet" href="layout.css">

  <style>
    * {
      font-family: 'Inter', sans-serif;
    }

    /* --- GLOBAL & BACKGROUND --- */
    body {
      background-color: #f3f4f6; /* Abu-abu sangat muda, nyaman di mata */
      color: #475569; /* Slate-600, bukan hitam pekat */
    }

    /* Toast Notification Style */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1060;
    }
    .custom-toast {
      background: white;
      border-left: 4px solid #6366f1; /* Indigo lebih lembut */
      padding: 1rem;
      border-radius: 12px; /* Sudut lebih tumpul */
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.3s ease-out;
      min-width: 300px;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* --- HERO SECTION (UBAH KE STYLE BERSIH) --- */
    .hero-gedung {
      background: #ffffff; /* Putih bersih */
      border: 1px solid #e2e8f0; /* Border abu-abu sangat muda */
      border-radius: 16px;
      padding: 2rem; /* Padding lebih lega */
      margin-bottom: 1.5rem;
      color: #1e293b; /* Teks gelap (bukan putih) */
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); /* Bayangan halus */
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    .hero-gedung h2 {
      margin: 0 0 0.5rem 0;
      font-size: 1.75rem;
      font-weight: 700;
      color: #0f172a; /* Slate-900 */
      letter-spacing: -0.025em;
    }

    .hero-gedung p {
      margin: 0;
      color: #64748b; /* Slate-500 */
      font-size: 0.95rem;
      font-weight: 500;
    }

    .btn-back {
      background: #f1f5f9; /* Abu-abu muda */
      border: 1px solid #e2e8f0;
      color: #475569;
      border-radius: 10px;
      padding: 0.6rem 1.2rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .btn-back:hover {
      background: #e2e8f0;
      color: #0f172a;
    }

    .btn-print-all {
      background: #6366f1; /* Indigo modern */
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.6rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
      box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2); /* Shadow warna */
    }

    .btn-print-all:hover {
      background: #4f46e5;
      transform: translateY(-1px);
      box-shadow: 0 6px 8px -1px rgba(99, 102, 241, 0.3);
    }

    /* --- RUANGAN CARDS (LEMBUT) --- */
    .ruangan-card {
      background: white;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      margin-bottom: 1.5rem;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
    }

    .ruangan-card:hover {
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
      border-color: #cbd5e1;
    }

    .ruangan-header {
      background: #ffffff; /* Transparan/putih bersih */
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      cursor: pointer;
    }

    .ruangan-header:hover {
      background: #f8fafc; /* Sedikit abu saat hover */
    }

    .ruangan-header h4 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
      color: #334155;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .ruangan-header h4 i {
      color: #6366f1; /* Indigo Icon */
      font-size: 1.2rem;
    }

    .ruangan-stats {
      display: flex;
      gap: 0.75rem;
      font-size: 0.8rem;
    }

    .ruangan-stats span {
      background: #f1f5f9;
      padding: 0.35rem 0.85rem;
      border-radius: 20px;
      color: #475569;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    
    /* Specific colors for stats but softer */
    .ruangan-stats span.text-success { background: #dcfce7; color: #166534; }
    .ruangan-stats span.text-warning { background: #fef3c7; color: #92400e; }
    .ruangan-stats span.text-danger { background: #fee2e2; color: #991b1b; }

    .btn-print-ruangan {
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      transition: all 0.2s;
      color: #64748b;
      font-weight: 500;
    }

    .btn-print-ruangan:hover {
      background: #eff6ff; /* Light blue background */
      border-color: #6366f1;
      color: #6366f1;
    }

    .ruangan-body {
      padding: 0;
      display: none;
      background: #ffffff;
    }

    .ruangan-body.show {
      display: block;
    }

    .table-barang {
      width: 100%;
      font-size: 0.9rem;
      border-collapse: collapse;
    }

    .table-barang th {
      background: #f8fafc;
      padding: 1rem 1.5rem;
      font-weight: 600;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
      color: #475569;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .table-barang td {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
      color: #334155;
    }
    
    /* Zebra striping sangat halus */
    .table-barang tr:nth-child(even) { background-color: #fcfcfc; }

    .badge-status {
      padding: 0.35rem 0.85rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-aktif { background: #dcfce7; color: #15803d; } /* Hijau lebih lembut */
    .badge-perawatan { background: #fef9c3; color: #854d0e; } /* Kuning lebih lembut */
    .badge-rusak { background: #fee2e2; color: #b91c1c; } /* Merah lebih lembut */

    .btn-foto {
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 0.35rem 0.85rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #64748b;
    }

    .btn-foto:hover {
      background: #6366f1;
      border-color: #6366f1;
      color: white;
    }

    .modal-foto {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.6); /* Overlay lebih gelap agar fokus */
      backdrop-filter: blur(5px);
      z-index: 9999;
      cursor: pointer;
      justify-content: center;
      align-items: center;
    }
    .modal-foto img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    .modal-foto.show {
      display: flex;
    }

    /* --- TOTAL FOOTER --- */
    .total-footer {
      background: #f8fafc;
      padding: 1.25rem 1.5rem;
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 1rem;
    }

    .total-footer i.icon-box {
      font-size: 1.4rem;
      color: #6366f1;
      background: #e0e7ff;
      padding: 0.75rem;
      border-radius: 12px;
    }

    .total-info {
      display: flex;
      flex-direction: column;
    }

    .total-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      font-weight: 600;
    }

    .total-number {
      font-size: 1.25rem;
      color: #0f172a;
      font-weight: 700;
    }

    /* --- PRINT STYLES (Sesuaikan dengan tampilan baru) --- */
    @media print {
      @page {
        size: A4 landscape;
        margin: 10mm;
      }
      body {
        background: white;
        padding: 0;
        margin: 0;
        -webkit-print-color-adjust: exact;
      }
      .sidebar, .btn-back, .btn-print-all, .btn-print-ruangan, .ruangan-header .bi-chevron-down, 
      #userInfo, .btn-outline-danger, #btnToggleSidebar, .btn-foto, .hero-gedung .btn-back, .toast-container {
        display: none !important;
      }
      .main-content {
        margin-left: 0 !important;
        padding: 0 !important;
      }
      .hero-gedung {
        background: none;
        border: none;
        box-shadow: none;
        margin-bottom: 10px;
        color: #000;
        padding: 0;
        text-align: center;
      }
      .hero-gedung h2 {
        font-size: 20pt;
        border-bottom: 2px solid #000;
        padding-bottom: 10px;
        display: inline-block;
        margin-bottom: 5px;
      }
      .ruangan-body {
        display: block !important;
      }
      .ruangan-card {
        break-inside: avoid;
        page-break-inside: avoid;
        border: none;
        margin-bottom: 30px;
        box-shadow: none;
      }
      .ruangan-header {
        background: #eee !important;
        color: #000;
        border-bottom: 2px solid #000;
        margin-bottom: 10px;
      }
      .ruangan-header h4 { color: #000; }
      
      .table-barang {
        font-size: 10pt;
        width: 100%;
      }
      .table-barang th { 
        background: #eee !important; 
        color: #000; 
        border-bottom: 1px solid #000; 
        border-top: 1px solid #000;
      }
      .table-barang td { border-bottom: 1px solid #ccc; }
      .table-barang tr:nth-child(even) { background-color: transparent; }
      
      .total-footer {
        background: #eee !important;
        border-top: 2px solid #000;
        border-bottom: 2px solid #000;
        padding: 10px 15px;
        display: flex !important;
        justify-content: space-between !important;
      }
      .total-footer i { display: none; }
      
      .print-footer {
        position: fixed;
        bottom: 0;
        right: 0;
        text-align: right;
        padding: 5px;
        font-size: 8pt;
        color: #999;
      }
    }
    
    .print-footer, .toast-placeholder {
      display: none;
    }

    .loading-state, .empty-state {
      padding: 4rem 2rem;
      text-align: center;
      color: #94a3b8;
      background: white;
      border-radius: 16px;
      border: 1px dashed #cbd5e1;
      margin: 1rem 0;
    }
  </style>
</head>

<div id="modalFoto" class="modal-foto" onclick="closeModalFoto()">
  <img id="modalFotoImg" src="" alt="Foto Barang">
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="layout.js"></script>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxDmu6TqknJafqXa-fqhi4njiOmJ6pG3Dc-2fiOJ6V7Wfl-1SpbZP5-v-n4sHYUwAz/exec';

let currentGedung = {
  kode: '',
  nama: '',
  ruanganList: []
};

let currentUser = {
  nama: '',
  role: ''
};

// Fungsi Toast
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'custom-toast';
  
  let iconClass = 'bi-info-circle-fill';
  let color = '#6366f1';
  
  if(type === 'error') { iconClass = 'bi-exclamation-circle-fill'; color = '#ef4444'; }
  if(type === 'success') { iconClass = 'bi-check-circle-fill'; color = '#10b981'; }
  
  toast.style.borderLeftColor = color;
  toast.innerHTML = `
    <i class="bi ${iconClass}" style="color: ${color}; font-size: 1.2rem;"></i>
    <span class="small fw-medium text-dark">${message}</span>
  `;
  
  container.appendChild(toast);
  
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100%)';
    toast.style.transition = 'all 0.3s ease';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function getCurrentDateTime() {
  const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
  const now = new Date();
  const dayName = days[now.getDay()];
  const date = now.getDate().toString().padStart(2, '0');
  const month = (now.getMonth() + 1).toString().padStart(2, '0');
  const year = now.getFullYear();
  const hours = now.getHours().toString().padStart(2, '0');
  const minutes = now.getMinutes().toString().padStart(2, '0');
  const seconds = now.getSeconds().toString().padStart(2, '0');
  
  return `${dayName}, ${date}/${month}/${year} ${hours}:${minutes}:${seconds}`;
}

function api(action, params = {}) {
  const body = new URLSearchParams({ action });
  const token = localStorage.getItem('token');
  if (token) body.append('token', token);
  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null) body.append(k, v);
  });
  return fetch(GAS_URL, { method: 'POST', body, redirect: 'follow' })
    .then(r => r.json())
    .then(res => {
      if (!res.success) throw new Error(res.error || 'Terjadi kesalahan');
      return res.data;
    });
}

function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
}

function getBadge(status) {
  if (status === 'Aktif') return '<span class="badge-status badge-aktif">Aktif</span>';
  if (status === 'Perawatan') return '<span class="badge-status badge-perawatan">Perawatan</span>';
  if (status === 'Rusak') return '<span class="badge-status badge-rusak">Rusak</span>';
  return `<span class="badge-status" style="background:#f1f5f9;color:#64748b">${status}</span>`;
}

function showFoto(fotoUrl) {
  if (!fotoUrl || fotoUrl === '-' || fotoUrl === '') {
    showToast('Tidak ada foto untuk barang ini', 'error');
    return;
  }
  const modal = document.getElementById('modalFoto');
  const img = document.getElementById('modalFotoImg');
  img.src = fotoUrl;
  modal.classList.add('show');
}

function closeModalFoto() {
  const modal = document.getElementById('modalFoto');
  modal.classList.remove('show');
  setTimeout(() => {
    document.getElementById('modalFotoImg').src = '';
  }, 300);
}

async function loadData() {
  const urlParams = new URLSearchParams(window.location.search);
  const kodeGedung = urlParams.get('kode') || '';

  if (!kodeGedung) {
    document.getElementById('gedungNama').innerHTML = '<span class="text-danger">Error: Parameter tidak valid</span>';
    document.getElementById('ruanganContainer').innerHTML = '<div class="empty-state">Kode gedung tidak ditemukan</div>';
    return;
  }

  try {
    const [gedungList, barangList, ruanganList] = await Promise.all([
      api('getGedung'),
      api('getBarang'),
      api('getRuangan')
    ]);

    const gedung = gedungList.find(g => g.kode === kodeGedung);
    if (!gedung) {
      document.getElementById('gedungNama').innerHTML = '<span class="text-danger">Gedung tidak ditemukan</span>';
      return;
    }

    currentGedung.kode = gedung.kode;
    currentGedung.nama = gedung.nama;

    const barangDiGedung = barangList.filter(b => (b.gedung || '') === kodeGedung);

    const ruanganSet = new Set();
    barangDiGedung.forEach(b => {
      if (b.ruangan && b.ruangan.trim()) {
        ruanganSet.add(b.ruangan);
      }
    });
    
    const ruanganDariMaster = (ruanganList || [])
      .filter(r => (r.kodeGedung || r.gedungKode || r.kode_gedung || '') === kodeGedung)
      .map(r => r.nama || r.nama_ruangan || '')
      .filter(n => n.trim());
    
    ruanganDariMaster.forEach(r => ruanganSet.add(r));

    let daftarRuangan = Array.from(ruanganSet).sort();
    
    if (daftarRuangan.length === 0 && barangDiGedung.length > 0) {
      daftarRuangan = ['Lainnya'];
    }

    const ruanganData = daftarRuangan.map(ruang => {
      const barang = barangDiGedung.filter(b => (b.ruangan || 'Lainnya') === ruang);
      const totalQuantity = barang.reduce((sum, b) => sum + (parseInt(b.jumlah) || 1), 0);
      const aktif = barang.filter(b => b.status === 'Aktif').reduce((sum, b) => sum + (parseInt(b.jumlah) || 1), 0);
      const perawatan = barang.filter(b => b.status === 'Perawatan').reduce((sum, b) => sum + (parseInt(b.jumlah) || 1), 0);
      const rusak = barang.filter(b => b.status === 'Rusak').reduce((sum, b) => sum + (parseInt(b.jumlah) || 1), 0);
      
      return {
        nama: ruang,
        barang: barang,
        stats: { 
          total: totalQuantity, 
          aktif: aktif, 
          perawatan: perawatan, 
          rusak: rusak,
          jenis: barang.length
        }
      };
    });

    currentGedung.ruanganList = ruanganData;

    const totalBarang = barangDiGedung.reduce((sum, b) => sum + (parseInt(b.jumlah) || 1), 0);
    document.getElementById('gedungNama').textContent = gedung.nama;
    document.getElementById('gedungInfo').innerHTML = `
      <i class="bi bi-building me-1"></i> ${gedung.kode} | 
      <i class="bi bi-box-seam me-1"></i> ${totalBarang} barang | 
      <i class="bi bi-door-open me-1"></i> ${ruanganData.length} ruangan
    `;

    renderRuanganCards(ruanganData);

  } catch (err) {
    console.error(err);
    document.getElementById('ruanganContainer').innerHTML = `
      <div class="empty-state text-danger">
        <i class="bi bi-exclamation-triangle fs-3"></i>
        <p class="mt-2">Gagal memuat data: ${err.message}</p>
      </div>
    `;
  }
}

function renderRuanganCards(ruanganData) {
  const container = document.getElementById('ruanganContainer');
  
  if (ruanganData.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <i class="bi bi-inbox fs-2"></i>
        <p class="mt-2">Belum ada barang di gedung ini</p>
      </div>
    `;
    return;
  }

  container.innerHTML = '';
  
  ruanganData.forEach((ruang, idx) => {
    const cardId = `ruangan_${idx}`;
    const showClass = idx === 0 ? 'show' : '';
    
    const barangRows = ruang.barang.map((b, no) => {
      const fotoHtml = b.foto ? 
        `<button class="btn-foto" onclick="event.stopPropagation(); showFoto('${b.foto.replace(/'/g, "\\'")}')">
           <i class="bi bi-image-fill"></i> Lihat
         </button>` : '-';

function toggleRuangan(cardId) {
  const body = document.getElementById(`body_${cardId}`);
  const icon = document.getElementById(`icon_${cardId}`);
  
  if (body.classList.contains('show')) {
    body.classList.remove('show');
    if (icon) icon.style.transform = 'rotate(0deg)';
  } else {
    body.classList.add('show');
    if (icon) icon.style.transform = 'rotate(180deg)';
  }
}

function cekLogin() {
  const token = localStorage.getItem('token');
  if (!token) {
    window.location.href = 'login.html';
    return;
  }
  api('getCurrentUser')
    .then(u => {
      currentUser.nama = u.nama || '';
      currentUser.role = u.role || '';
      document.getElementById('userInfo').textContent = `${u.nama} (${u.role})`;
      loadData();
    })
    .catch(() => {
      localStorage.clear();
      window.location.href = 'login.html';
    });
}

function doLogout() {
  api('logout').finally(() => {
    localStorage.clear();
    window.location.href = 'login.html';
  });
}

window.onload = cekLogin;
