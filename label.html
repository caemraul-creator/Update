<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Label QR Barang</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <!-- QRCode JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      background: #f5f6f8;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 1rem;
    }

    .label-container {
      max-width: 500px;
      margin: 0 auto;
    }

    .label-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 2rem;
      text-align: center;
    }

    .label-card h4 {
      margin-bottom: 1.5rem;
      font-weight: 700;
    }

    .qr-wrap {
      display: inline-block;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      background: #fafafa;
    }

    .label-id {
      margin-top: 1rem;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #1f2937;
    }

    .label-lokasi {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: #6b7280;
    }

    .label-nama {
      margin-top: 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #374151;
    }

    .btn-print {
      margin-top: 1.5rem;
    }

    .loading-msg {
      padding: 3rem;
      text-align: center;
      color: #6b7280;
    }

    .error-msg {
      padding: 2rem;
      text-align: center;
      color: #dc3545;
    }

    /* Print mode */
    @media print {
      body { background: #fff; padding: 0; }
      .btn-print { display: none !important; }
      .label-card { box-shadow: none; border: 1px solid #ccc; }
    }
  </style>
</head>
<body>

  <div class="label-container">
    <div id="labelContent" class="loading-msg">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Memuat...</span>
      </div>
      <p class="mt-3">Memuat data barang...</p>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbybksSrPgy0enr2mltrtNIsawIHRf8lFc6O0i1zWrfAXAJYogPWIVzizmVADad2No9U/exec';
    const BASE_URL = 'https://invenruangan.pages.dev/';

    /* API helper (tanpa token, untuk publik) */
    function api(action, params = {}) {
      const body = new URLSearchParams({ action });
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null) body.append(k, v);
      });
      return fetch(GAS_URL, { method: 'POST', body, redirect: 'follow' })
        .then(r => r.json())
        .then(res => {
          if (!res.success) throw new Error(res.error || 'Terjadi kesalahan');
          return res.data;
        });
    }

    function init() {
      const urlParams = new URLSearchParams(window.location.search);
      const id      = urlParams.get('id') || '';
      const gedung  = urlParams.get('gedung') || '';
      const ruangan = urlParams.get('ruangan') || '';

      if (!id) {
        document.getElementById('labelContent').innerHTML =
          '<div class="error-msg"><i class="bi bi-exclamation-circle" style="font-size:2rem;"></i>' +
          '<p class="mt-2">ID barang tidak ditemukan di URL.</p></div>';
        return;
      }

      // Pakai getBarangByIdPublic (tanpa login)
      api('getBarangByIdPublic', { id, gedung, ruangan })
        .then(b => {
          renderLabel(b, gedung, ruangan);
        })
        .catch(err => {
          document.getElementById('labelContent').innerHTML =
            '<div class="error-msg"><i class="bi bi-x-circle" style="font-size:2rem;"></i>' +
            '<p class="mt-2">Barang tidak ditemukan: ' + err.message + '</p></div>';
        });
    }

    function renderLabel(b, gedung, ruangan) {
      const container = document.getElementById('labelContent');

      // Buat URL QR dengan lokasi spesifik
      const qrUrl = BASE_URL + 'detail-barang.html?id=' +
        encodeURIComponent(b.id) +
        '&gedung=' + encodeURIComponent(b.gedung || gedung || '') +
        '&ruangan=' + encodeURIComponent(b.ruangan || ruangan || '');

      container.innerHTML = `
        <div class="label-card">
          <h4><i class="bi bi-upc-scan"></i> Label Inventaris</h4>
          <div class="qr-wrap">
            <div id="qrCode"></div>
          </div>
          <div class="label-id">${b.id}</div>
          <div class="label-nama">${b.nama}</div>
          <div class="label-lokasi">${b.gedung || '-'} / ${b.ruangan || '-'}</div>
          <div style="margin-top:0.5rem;">
            <span class="badge ${b.status === 'Aktif' ? 'bg-success' : b.status === 'Rusak' ? 'bg-danger' : 'bg-secondary'}">${b.status || '-'}</span>
          </div>
          <button class="btn btn-primary btn-print" onclick="window.print()">
            <i class="bi bi-printer"></i> Cetak Label
          </button>
        </div>
      `;

      // Generate QR Code
      new QRCode(document.getElementById('qrCode'), {
        text: qrUrl,
        width: 180,
        height: 180,
        correctLevel: QRCode.CorrectLevel.M
      });
    }

    window.onload = init;
  </script>
</body>
</html>
