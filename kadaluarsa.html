<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Kadaluarsa — POS Gudang Pro</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0f1117; --ink2: #3d4350; --ink3: #8891a5; --border: #e4e7ef;
            --bg: #f0f2f8; --surface: #ffffff; --accent: #3b5bdb; --accent2: #4c6ef5;
            --green: #0ca678; --red: #f03e3e; --amber: #f59f00; --surface2: #f8f9fc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

        /* ===== TOPBAR ===== */
        .topbar {
            background: var(--ink);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky; top: 0; z-index: 10;
        }
        .topbar-logo { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--accent2); text-transform: uppercase; flex-shrink: 0; }
        .topbar-title { font-weight: 700; font-size: 15px; color: #fff; flex: 1; }
        .topbar-sub { font-size: 12px; color: rgba(255,255,255,0.45); font-weight: 400; margin-left: 8px; }
        .topbar-nav { display: flex; gap: 6px; align-items: center; }
        .nav-link {
            padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
            text-decoration: none; color: rgba(255,255,255,0.55); transition: all 0.15s;
            border: 1px solid transparent; white-space: nowrap;
        }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .nav-link.active { color: #fff; background: var(--accent); border-color: var(--accent2); }

        .print-btn {
            padding: 6px 14px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 12px;
            font-weight: 600; cursor: pointer; color: rgba(255,255,255,0.7); transition: all 0.15s;
            display: flex; align-items: center; gap: 5px;
        }
        .print-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }

        /* ===== AUTO REFRESH BAR ===== */
        .refresh-bar {
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            padding: 6px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: var(--ink3);
        }
        .refresh-bar .refresh-icon { font-size: 14px; }
        .refresh-bar .refresh-btn {
            padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 11px;
            font-weight: 600; cursor: pointer; color: var(--ink2); transition: all 0.15s;
        }
        .refresh-bar .refresh-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .refresh-bar .countdown { font-family: 'DM Mono', monospace; font-weight: 600; color: var(--accent); }
        .refresh-bar .last-update { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 11px; }

        /* ===== SUMMARY CARDS ===== */
        .summary-bar {
            display: flex; gap: 14px; padding: 20px 24px 0; flex-wrap: wrap;
        }
        .summary-card {
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 14px; padding: 16px 22px; min-width: 150px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .summary-card .sc-val { font-size: 28px; font-weight: 700; font-family: 'DM Mono', monospace; }
        .summary-card .sc-label { font-size: 12px; color: var(--ink3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .summary-card.danger .sc-val { color: var(--red); }
        .summary-card.warn .sc-val   { color: var(--amber); }
        .summary-card.ok .sc-val     { color: var(--green); }
        .summary-card.total .sc-val  { color: #7c3aed; }
        .summary-card.risk { border-color: #ffe3e3; background: #fff5f5; }
        .summary-card.risk .sc-val { color: var(--red); font-size: 22px; }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            display: flex; gap: 10px; padding: 18px 24px 14px; align-items: center; flex-wrap: wrap;
        }
        .filter-btn {
            padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--border);
            background: var(--surface); font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 600; cursor: pointer; color: var(--ink2);
            transition: all 0.15s; white-space: nowrap;
        }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .filter-btn.f-expired.active  { background: var(--red); border-color: var(--red); }
        .filter-btn.f-critical.active { background: #f76707; border-color: #f76707; }
        .filter-btn.f-warning.active  { background: var(--amber); border-color: var(--amber); color: #fff; }
        .filter-btn.f-waspada.active  { background: #4dabf7; border-color: #4dabf7; color: #fff; }
        .filter-btn.f-ok.active       { background: var(--green); border-color: var(--green); }
        .search-exp {
            margin-left: auto; padding: 8px 14px 8px 36px; border: 1.5px solid var(--border);
            border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px;
            background: var(--surface); outline: none; min-width: 200px; color: var(--ink);
            transition: border-color 0.15s; position: relative;
        }
        .search-exp:focus { border-color: var(--accent); }
        .search-wrap-exp { position: relative; }
        .search-wrap-exp::before {
            content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            font-size: 14px; pointer-events: none;
        }
        .sort-select {
            padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px;
            font-family: 'DM Sans', sans-serif; font-size: 13px; background: var(--surface);
            color: var(--ink2); outline: none; cursor: pointer;
        }

        /* Bulk action buttons */
        .bulk-btns { display: flex; gap: 6px; align-items: center; }
        .bulk-btn {
            padding: 6px 14px; border-radius: 8px; border: 1.5px solid #ffd0d0;
            background: #fff5f5; font-family: 'DM Sans', sans-serif; font-size: 12px;
            font-weight: 600; cursor: pointer; color: var(--red); transition: all 0.15s;
            display: flex; align-items: center; gap: 5px;
        }
        .bulk-btn:hover { background: var(--red); color: #fff; border-color: var(--red); }
        .bulk-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .bulk-btn.select-all {
            border-color: var(--border); background: var(--surface); color: var(--ink2);
        }
        .bulk-btn.select-all:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .selected-count { font-size: 11px; color: var(--ink3); font-family: 'DM Mono', monospace; }

        /* ===== TABLE ===== */
        .table-wrap { padding: 0 24px 32px; overflow-x: auto; }
        .exp-table {
            width: 100%; border-collapse: collapse;
            background: var(--surface); border-radius: 14px;
            overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .exp-table thead th {
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--ink3); font-weight: 700; padding: 12px 16px;
            border-bottom: 2px solid var(--border); background: var(--surface2);
            text-align: left; white-space: nowrap;
        }
        .exp-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
        .exp-table tbody tr:last-child { border-bottom: none; }
        .exp-table tbody tr:hover { background: var(--surface2); }
        .exp-table td { padding: 12px 16px; font-size: 13px; vertical-align: middle; }

        .exp-table tr.row-expired  { background: #fff5f5; }
        .exp-table tr.row-critical { background: #fff8f2; }
        .exp-table tr.row-warning  { background: #fffdf0; }
        .exp-table tr.row-waspada  { background: #e8f4fd; }

        .exp-badge {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 12px; font-family: 'DM Mono', monospace; padding: 4px 10px;
            border-radius: 6px; font-weight: 700; white-space: nowrap;
        }
        .exp-badge.expired  { background: #ffe3e3; color: var(--red); }
        .exp-badge.critical { background: #ffe8d5; color: #e8590c; }
        .exp-badge.warning  { background: #fff3bf; color: #b07d00; }
        .exp-badge.waspada  { background: #d0ebff; color: #1864ab; }
        .exp-badge.ok       { background: #e6fcf5; color: var(--green); }
        .exp-badge.none     { background: #f1f3f5; color: var(--ink3); }

        .prod-name { font-weight: 600; color: var(--ink); }
        .prod-meta { font-size: 11px; color: var(--ink3); margin-top: 2px; }
        .stock-pill {
            display: inline-block; padding: 3px 9px; border-radius: 5px;
            font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600;
        }
        .stock-pill.empty { background: #ffe3e3; color: var(--red); }
        .stock-pill.low   { background: #fff3bf; color: #b07d00; }
        .stock-pill.ok    { background: #e6fcf5; color: var(--green); }

        .days-bar-wrap { width: 120px; }
        .days-bar {
            height: 6px; border-radius: 3px; background: #e9ecef; margin-top: 4px; overflow: hidden;
        }
        .days-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

        .empty-state {
            text-align: center; padding: 60px 20px;
            color: var(--ink3); font-size: 14px;
        }
        .empty-state .big-icon { font-size: 48px; margin-bottom: 12px; }

        /* ===== LEGEND ===== */
        .legend { display: none; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .legend-dot.expired  { background: var(--red); }
        .legend-dot.critical { background: #f76707; }
        .legend-dot.warning  { background: var(--amber); }
        .legend-dot.ok       { background: var(--green); }

        /* Loading state */
        .loading { text-align: center; padding: 60px; color: var(--ink3); font-size: 14px; }

        /* Discard button */
        .discard-btn {
            padding: 5px 10px; border-radius: 6px; border: 1px solid #ffd0d0;
            background: #fff5f5; font-family: 'DM Sans', sans-serif; font-size: 11px;
            font-weight: 600; cursor: pointer; color: var(--red); transition: all 0.15s;
            white-space: nowrap;
        }
        .discard-btn:hover { background: var(--red); color: #fff; border-color: var(--red); }

        /* Checkbox */
        .row-checkbox {
            width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent);
        }

        /* Batch row */
        .batch-row { background: #f8f9fc !important; }
        .batch-row td { font-size: 12px; padding: 8px 16px 8px 56px; }
        .batch-label {
            font-size: 10px; font-family: 'DM Mono', monospace;
            padding: 2px 8px; border-radius: 4px; background: #eef2ff; color: var(--accent);
            font-weight: 600; display: inline-block; margin-bottom: 2px;
        }
        .expand-btn {
            padding: 3px 8px; border-radius: 5px; border: 1px solid var(--border);
            background: var(--surface); font-size: 11px; cursor: pointer; color: var(--ink2);
            font-family: 'DM Sans', sans-serif; font-weight: 600; transition: all 0.15s;
        }
        .expand-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

        @media print {
            .topbar, .filter-bar, .legend, .back-btn, .print-btn, .search-wrap-exp, .sort-select,
            .refresh-bar, .bulk-btns, .discard-btn, .row-checkbox, .expand-btn { display: none !important; }
            .summary-bar {
                padding: 8px 0 0;
                flex-wrap: nowrap !important;
                gap: 6px;
            }
            .summary-card {
                min-width: 0 !important;
                flex: 1;
                padding: 8px 10px;
                border-radius: 8px;
            }
            .summary-card .sc-val { font-size: 18px; }
            .summary-card .sc-label { font-size: 9px; }
            .table-wrap  { padding: 0; }
            .exp-table th:nth-child(1), .exp-table td:nth-child(1) { display: none; }
            .exp-table th:nth-child(8), .exp-table td:nth-child(8) { display: none; }
        }
    .mobile-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #0f1117; padding: 6px 0 calc(6px + env(safe-area-inset-bottom)); z-index: 200; border-top: 1px solid rgba(255,255,255,0.1); justify-content: space-around; align-items: center; }
    .bnav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none; color: rgba(255,255,255,0.5); font-size: 10px; font-weight: 600; padding: 4px 8px; transition: color 0.2s; }
    .bnav-item.active, .bnav-item:hover { color: #4c6ef5; }
    .bnav-icon { font-size: 20px; }
    .bnav-label { font-size: 9px; }
    @media (max-width: 768px) { .mobile-bottom-nav { display: flex; } body { padding-bottom: 70px !important; } }
    @media (max-width: 768px) {
        .topbar { padding: 0 12px; }
        .topbar-nav { display: none !important; }
        html, body { max-width: 100vw; overflow-x: hidden; }
        .refresh-bar { padding: 6px 12px; flex-wrap: wrap; }
        .refresh-bar .last-update { margin-left: 0; width: 100%; }
        .summary-bar { padding: 12px 12px 0 !important; gap: 8px; }
        .summary-card { min-width: calc(50% - 4px); padding: 12px 14px; }
        .summary-card .sc-val { font-size: 20px; }
        .filter-bar { padding: 12px 12px !important; gap: 6px; }
        .filter-bar .filter-btn { font-size: 11px; padding: 5px 10px; }
        .filter-bar .search-wrap-exp { margin-left: 0; }
        .search-exp { min-width: 0; width: 100%; }
        .sort-select { width: 100%; }
        .bulk-btns { flex-wrap: wrap; width: 100%; }
        .bulk-btn { font-size: 11px; padding: 5px 10px; }
        .table-wrap { padding: 0 8px 80px !important; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .exp-table { font-size: 12px; }
        .exp-table thead th { padding: 8px 10px; font-size: 10px; }
        .exp-table td { padding: 8px 10px; font-size: 12px; }
        .days-bar-wrap { width: 80px; }
        .print-btn { display: none; }
        .exp-table th:nth-child(9), .exp-table td:nth-child(9) { min-width: 80px; }
    }
</style>
</head>
<body>

<!-- TOPBAR with Navigation -->
<div class="topbar">
    <span class="topbar-logo">POS PRO</span>
    <span class="topbar-title">🗓 Kadaluarsa <span class="topbar-sub" id="update-time"></span></span>
    <div class="topbar-nav">
        <a href="index.html" class="nav-link">🏠 Beranda</a>
        <a href="produk.html" class="nav-link">📦 Produk</a>
        <a href="riwayat.html" class="nav-link">📋 Riwayat</a>
        <a href="rekap.html" class="nav-link">📊 Rekap</a>
        <a href="pelanggan.html" class="nav-link">👥 Pelanggan</a>
        <a href="kadaluarsa.html" class="nav-link active">🗓 Kadaluarsa</a>
    </div>
    <button class="print-btn" onclick="window.print()">🖨 Cetak</button>
</div>

<!-- AUTO REFRESH BAR -->
<div class="refresh-bar">
    <span class="refresh-icon">🔄</span>
    <span>Auto-refresh setiap <strong>5 menit</strong></span>
    <span class="countdown" id="refresh-countdown">5:00</span>
    <button class="refresh-btn" onclick="manualRefresh()">🔄 Refresh Sekarang</button>
    <span class="last-update" id="last-update-label">Update: —</span>
</div>

<!-- SUMMARY CARDS -->
<div class="summary-bar" id="summary-bar">
    <div class="loading">⏳ Memuat data...</div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Semua</button>
    <button class="filter-btn f-expired" data-filter="expired" onclick="setFilter('expired', this)">🚫 Kadaluarsa</button>
    <button class="filter-btn f-critical" data-filter="critical" onclick="setFilter('critical', this)">⚠ Kritis (≤7 hari)</button>
    <button class="filter-btn f-warning" data-filter="warning" onclick="setFilter('warning', this)">🟡 Peringatan (≤30 hari)</button>
    <button class="filter-btn f-waspada" data-filter="waspada" onclick="setFilter('waspada', this)">🔵 Waspada (≤3 bln)</button>
    <button class="filter-btn f-ok" data-filter="ok" onclick="setFilter('ok', this)">✅ Aman</button>
    <button class="filter-btn" data-filter="none" onclick="setFilter('none', this)">— Tanpa Tgl</button>

    <div class="bulk-btns">
        <button class="bulk-btn select-all" onclick="selectAllExpired()">☑ Pilih Kadaluarsa</button>
        <button class="bulk-btn" id="bulk-discard-btn" onclick="bulkDiscard()" disabled>
            🗑 Hapus Semua Terpilih (<span id="selected-count">0</span>)
        </button>
    </div>

    <div class="search-wrap-exp">
        <input class="search-exp" id="search-exp" type="text" placeholder="Cari nama produk..." oninput="renderTable()">
    </div>
    <select class="sort-select" id="sort-exp" onchange="renderTable()">
        <option value="exp-asc">Urutkan: Paling Dekat Kadaluarsa</option>
        <option value="exp-desc">Urutkan: Paling Jauh Kadaluarsa</option>
        <option value="name">Urutkan: Nama A–Z</option>
        <option value="stock">Urutkan: Stok Terkecil</option>
    </select>
</div>

<!-- TABLE -->
<div class="table-wrap">
    <table class="exp-table">
        <thead>
            <tr>
                <th style="width:36px;"><input type="checkbox" class="row-checkbox" id="check-all" onchange="toggleAll(this.checked)" title="Pilih Semua"></th>
                <th>#</th>
                <th>Nama Produk</th>
                <th>Stok</th>
                <th>Harga Jual</th>
                <th>Tgl Kadaluarsa</th>
                <th>Status</th>
                <th>Sisa Hari</th>
                <th style="width:100px;">Aksi</th>
            </tr>
        </thead>
        <tbody id="exp-table-body">
            <tr><td colspan="9" class="loading">⏳ Memuat data Firebase...</td></tr>
        </tbody>
    </table>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>

<script>
// ===== FIREBASE INIT =====
var db, productsRef;
var _renderTimeout = null;

try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    productsRef = db.ref('products');
} catch(e) {
    document.getElementById('exp-table-body').innerHTML =
        '<tr><td colspan="9" style="text-align:center;color:var(--red);padding:30px;">❌ Gagal terhubung Firebase: ' + e.message + '</td></tr>';
}

// ===== STATE =====
var productsData = {};
var activeFilter = 'all';
var selectedRows = {};
var expandedBatches = {};

// ===== AUTO REFRESH TIMER =====
var refreshInterval = 5 * 60; // 5 minutes in seconds
var refreshCountdown = refreshInterval;
var refreshTimer = null;

function startRefreshTimer() {
    refreshCountdown = refreshInterval;
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(function() {
        refreshCountdown--;
        if (refreshCountdown <= 0) {
            refreshCountdown = refreshInterval;
            doRefresh();
        }
        updateCountdownDisplay();
    }, 1000);
}

function updateCountdownDisplay() {
    var min = Math.floor(refreshCountdown / 60);
    var sec = refreshCountdown % 60;
    var el = document.getElementById('refresh-countdown');
    if (el) el.textContent = min + ':' + (sec < 10 ? '0' : '') + sec;
}

function manualRefresh() {
    doRefresh();
    showToast('🔄 Data berhasil di-refresh!', 'success');
}

function doRefresh() {
    productsRef.once('value', function(snap) {
        productsData = snap.val() || {};
        try { localStorage.setItem('productsCache', JSON.stringify(productsData)); } catch(e) {}
        renderSummary();
        renderTable();
        refreshCountdown = refreshInterval;
        updateLastUpdate();
    });
}

function updateLastUpdate() {
    var now = new Date();
    var label = now.toLocaleString('id-ID', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
    var el = document.getElementById('last-update-label');
    if (el) el.textContent = 'Update: ' + label;
    var el2 = document.getElementById('update-time');
    if (el2) el2.textContent = '— ' + now.toLocaleString('id-ID', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}

// ===== SIMPLE TOAST =====
function showToast(msg, type) {
    var existing = document.getElementById('_toast');
    if (existing) existing.remove();
    var t = document.createElement('div');
    t.id = '_toast';
    t.textContent = msg;
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:' +
        (type === 'success' ? '#0ca678' : type === 'error' ? '#f03e3e' : '#0f1117') +
        ';color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;transition:transform 0.3s ease;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.3);font-family:DM Sans,sans-serif;';
    document.body.appendChild(t);
    setTimeout(function() { t.style.transform = 'translateX(-50%) translateY(0)'; }, 50);
    setTimeout(function() { t.style.transform = 'translateX(-50%) translateY(80px)'; setTimeout(function() { t.remove(); }, 300); }, 2500);
}

// ===== HELPERS =====
function getExpiryStatus(tglKadaluarsa) {
    if (!tglKadaluarsa) return null;
    var today = new Date(); today.setHours(0,0,0,0);
    var exp = new Date(tglKadaluarsa);
    var diffDays = Math.floor((exp - today) / (1000 * 60 * 60 * 24));
    if (diffDays < 0)   return { status: 'expired',  days: diffDays, label: 'KADALUARSA',           sub: Math.abs(diffDays) + ' hari lalu', cls: 'expired'  };
    if (diffDays === 0) return { status: 'critical', days: 0,        label: 'Hari ini!',             sub: 'Hari terakhir',                    cls: 'critical' };
    if (diffDays <= 7)  return { status: 'critical', days: diffDays, label: 'Kritis',                sub: diffDays + ' hari lagi',            cls: 'critical' };
    if (diffDays <= 30) return { status: 'warning',  days: diffDays, label: 'Perlu Perhatian',       sub: diffDays + ' hari lagi',            cls: 'warning'  };
    if (diffDays <= 90) return { status: 'waspada',  days: diffDays, label: 'Waspada',               sub: diffDays + ' hari lagi',            cls: 'waspada'  };
    return               { status: 'ok',       days: diffDays, label: 'Aman',                sub: diffDays + ' hari lagi',            cls: 'ok'       };
}

function fmtTgl(tgl) {
    if (!tgl) return '—';
    var p = tgl.split('-');
    if (p.length !== 3) return tgl;
    return p[2] + '/' + p[1] + '/' + p[0];
}

function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderTable();
}

// ===== MARK AS DISCARDED =====
function markDiscarded(id, name) {
    if (!confirm('⚠ Tandai "' + name + '" sebagai dibuang?\n\nStok akan dijadikan 0 dan tanggal kadaluarsa akan dihapus.\nTindakan ini tidak dapat dibatalkan.')) return;
    productsRef.child(id).update({ stock: 0, kadaluarsa: null }).then(function() {
        showToast('✅ ' + name + ' telah ditandai dibuang', 'success');
    }).catch(function(e) {
        showToast('❌ Gagal: ' + e.message, 'error');
    });
}

// Discard a specific batch
function discardBatch(id, batchIdx, name) {
    if (!confirm('⚠ Buang batch ' + (batchIdx + 1) + ' dari "' + name + '"?\n\nStok batch akan dijadikan 0.')) return;
    productsRef.child(id).child('batches').child(batchIdx).update({ stock: 0, kadaluarsa: null }).then(function() {
        showToast('✅ Batch berhasil dibuang', 'success');
    }).catch(function(e) {
        showToast('❌ Gagal: ' + e.message, 'error');
    });
}

// ===== BULK ACTIONS =====
function toggleAll(checked) {
    selectedRows = {};
    if (checked) {
        // Select all currently visible items
        var q = (document.getElementById('search-exp').value || '').toLowerCase();
        var sortBy = document.getElementById('sort-exp').value;
        var items = buildFilteredItems(q, sortBy);
        items.forEach(function(item) {
            var id = item.id;
            var s = item.status;
            if (s && (s.status === 'expired' || s.status === 'critical')) {
                selectedRows[id] = true;
            }
        });
    }
    updateBulkState();
    renderTable();
}

function selectAllExpired() {
    selectedRows = {};
    var q = (document.getElementById('search-exp').value || '').toLowerCase();
    var sortBy = document.getElementById('sort-exp').value;
    var items = buildFilteredItems(q, sortBy);
    items.forEach(function(item) {
        var s = item.status;
        if (s && s.status === 'expired') {
            selectedRows[item.id] = true;
        }
    });
    updateBulkState();
    renderTable();
}

function toggleRow(id, checked) {
    if (checked) selectedRows[id] = true;
    else delete selectedRows[id];
    updateBulkState();
}

function updateBulkState() {
    var count = Object.keys(selectedRows).length;
    var btn = document.getElementById('bulk-discard-btn');
    var countEl = document.getElementById('selected-count');
    if (countEl) countEl.textContent = count;
    if (btn) btn.disabled = count === 0;
    var checkAll = document.getElementById('check-all');
    if (checkAll) checkAll.checked = false;
}

// ===== TOGGLE BATCH EXPAND =====
function toggleBatch(id) {
    expandedBatches[id] = !expandedBatches[id];
    renderTable();
}

// ===== RENDER SUMMARY =====
function renderSummary() {
    var all = Object.values(productsData);
    var withDate = all.filter(function(p) { return !!p.kadaluarsa; });
    var expired = 0, critical = 0, warning = 0, waspada = 0, ok = 0;
    var riskValue = 0;

    withDate.forEach(function(p) {
        var s = getExpiryStatus(p.kadaluarsa);
        if (!s) return;
        if (s.status === 'expired') { expired++; riskValue += (p.price || 0) * (p.stock || 0); }
        else if (s.status === 'critical') { critical++; riskValue += (p.price || 0) * (p.stock || 0); }
        else if (s.status === 'warning')  warning++;
        else if (s.status === 'waspada')  waspada++;
        else ok++;
    });

    updateLastUpdate();

    document.getElementById('summary-bar').innerHTML =
        '<div class="summary-card total"><div class="sc-val">' + all.length + '</div><div class="sc-label">Total Produk</div></div>' +
        '<div class="summary-card danger"><div class="sc-val" style="color:var(--red)">' + expired + '</div><div class="sc-label">🚫 Sudah Kadaluarsa</div></div>' +
        '<div class="summary-card warn"><div class="sc-val" style="color:#f76707">' + critical + '</div><div class="sc-label">⚠ Kritis ≤ 7 hari</div></div>' +
        '<div class="summary-card warn"><div class="sc-val" style="color:var(--amber)">' + warning + '</div><div class="sc-label">🟡 Peringatan ≤ 30 hari</div></div>' +
        '<div class="summary-card" style="border-color:#4dabf7"><div class="sc-val" style="color:#1864ab">' + waspada + '</div><div class="sc-label">🔵 Waspada ≤ 3 bln</div></div>' +
        '<div class="summary-card ok"><div class="sc-val">' + ok + '</div><div class="sc-label">✅ Aman</div></div>' +
        '<div class="summary-card risk"><div class="sc-val">Rp ' + riskValue.toLocaleString('id-ID') + '</div><div class="sc-label">💰 Nilai Stok Terancam</div></div>' +
        '<div class="summary-card"><div class="sc-val" style="color:var(--ink3)">' + (all.length - withDate.length) + '</div><div class="sc-label">— Tanpa Tanggal</div></div>';
}

// ===== BUILD FILTERED ITEMS =====
function buildFilteredItems(q, sortBy) {
    var items = Object.keys(productsData).map(function(id) {
        var p = productsData[id];
        var status = getExpiryStatus(p.kadaluarsa);
        return { id: id, p: p, status: status };
    });

    // Filter
    items = items.filter(function(item) {
        var p = item.p;
        if (q && !p.name.toLowerCase().includes(q)) return false;
        if (activeFilter === 'all') return true;
        if (activeFilter === 'none') return !p.kadaluarsa;
        if (!item.status) return false;
        return item.status.status === activeFilter;
    });

    // Sort
    items.sort(function(a, b) {
        if (sortBy === 'name') return (a.p.name || '').localeCompare(b.p.name || '');
        if (sortBy === 'stock') return (a.p.stock || 0) - (b.p.stock || 0);
        if (sortBy === 'exp-desc') {
            if (!a.p.kadaluarsa && !b.p.kadaluarsa) return 0;
            if (!a.p.kadaluarsa) return 1;
            if (!b.p.kadaluarsa) return -1;
            return new Date(b.p.kadaluarsa) - new Date(a.p.kadaluarsa);
        }
        if (!a.p.kadaluarsa && !b.p.kadaluarsa) return 0;
        if (!a.p.kadaluarsa) return 1;
        if (!b.p.kadaluarsa) return -1;
        return new Date(a.p.kadaluarsa) - new Date(b.p.kadaluarsa);
    });

    return items;
}

// ===== RENDER TABLE WITH DEBOUNCE =====
function renderTable() {
    if (_renderTimeout) clearTimeout(_renderTimeout);
    _renderTimeout = setTimeout(function() {
        _renderTable();
    }, 100);
}

function _renderTable() {
    var q = (document.getElementById('search-exp').value || '').toLowerCase();
    var sortBy = document.getElementById('sort-exp').value;
    var tbody = document.getElementById('exp-table-body');
    if (!tbody) return;
    tbody.innerHTML = '';

    var items = buildFilteredItems(q, sortBy);

    if (items.length === 0) {
        tbody.innerHTML =
            '<tr><td colspan="9"><div class="empty-state"><div class="big-icon">🎉</div>' +
            '<div>Tidak ada produk pada filter ini</div></div></td></tr>';
        return;
    }

    var rowIdx = 0;
    items.forEach(function(item) {
        var p = item.p;
        var s = item.status;
        var id = item.id;
        var hasBatches = p.batches && typeof p.batches === 'object' && Object.keys(p.batches).length > 0;
        var isExpanded = expandedBatches[id];
        var isExpiredOrCritical = s && (s.status === 'expired' || s.status === 'critical');
        var isChecked = !!selectedRows[id];

        rowIdx++;
        var tr = document.createElement('tr');
        if (s) {
            if (s.status === 'expired')  tr.className = 'row-expired';
            else if (s.status === 'critical') tr.className = 'row-critical';
            else if (s.status === 'warning')  tr.className = 'row-warning';
        }

        var stockCls = p.stock === 0 ? 'empty' : p.stock <= 5 ? 'low' : 'ok';
        var stockPill = '<span class="stock-pill ' + stockCls + '">' + (p.stock || 0) + '</span>';

        var expBadge, daysBar;
        if (!s) {
            expBadge = '<span class="exp-badge none">—</span>';
            daysBar = '<span style="color:var(--ink3); font-size:12px;">—</span>';
        } else {
            expBadge = '<span class="exp-badge ' + s.cls + '">' + s.label + '</span>';
            var barPct = s.status === 'expired' ? 100 : Math.min(100, Math.max(0, 1 - (s.days / 365)) * 100);
            var barColor = s.status === 'expired' ? 'var(--red)' : s.status === 'critical' ? '#f76707' : s.status === 'warning' ? 'var(--amber)' : 'var(--green)';
            var daysTxt = s.status === 'expired'
                ? '<span style="color:var(--red); font-family:DM Mono,monospace; font-size:12px; font-weight:700;">' + Math.abs(s.days) + ' hari lalu</span>'
                : '<span style="font-family:DM Mono,monospace; font-size:12px; font-weight:700;">' + s.days + ' hari</span>';
            daysBar = '<div class="days-bar-wrap">' + daysTxt +
                '<div class="days-bar"><div class="days-bar-fill" style="width:' + barPct + '%; background:' + barColor + ';"></div></div>' +
                '</div>';
        }

        // Action column
        var actionHtml = '';
        if (isExpiredOrCritical && p.stock > 0) {
            actionHtml = '<button class="discard-btn" onclick="event.stopPropagation(); markDiscarded(\'' + id + '\', \'' + (p.name || '').replace(/'/g, "\\'") + '\')">🗑 Buang</button>';
        }

        // Batch expand button
        var batchInfo = '';
        if (hasBatches) {
            var batchKeys = Object.keys(p.batches);
            var batchCount = batchKeys.length;
            batchInfo = ' <span style="font-size:10px;color:var(--accent);font-weight:600;">(' + batchCount + ' batch)</span>';
        }

        tr.innerHTML =
            '<td><input type="checkbox" class="row-checkbox" ' + (isChecked ? 'checked' : '') + ' onchange="toggleRow(\'' + id + '\', this.checked)" ' + (!isExpiredOrCritical ? 'disabled title="Hanya kadaluarsa/kritis"' : '') + '></td>' +
            '<td style="font-family:DM Mono,monospace; font-size:12px; color:var(--ink3);">' + rowIdx + '</td>' +
            '<td><div class="prod-name">' + p.name + batchInfo + '</div>' +
                (p.barcode ? '<div class="prod-meta">Barcode: ' + p.barcode + '</div>' : '') +
                (hasBatches ? '<div style="margin-top:4px;"><button class="expand-btn" onclick="event.stopPropagation(); toggleBatch(\'' + id + '\')">' + (isExpanded ? '▼ Sembunyikan Batch' : '▶ Lihat ' + batchCount + ' Batch') + '</button></div>' : '') +
            '</td>' +
            '<td>' + stockPill + '</td>' +
            '<td style="font-family:DM Mono,monospace; font-size:12px;">Rp ' + (p.price || 0).toLocaleString('id-ID') + '</td>' +
            '<td style="font-family:DM Mono,monospace; font-size:13px; font-weight:600;">' + fmtTgl(p.kadaluarsa) + '</td>' +
            '<td>' + expBadge + '</td>' +
            '<td>' + daysBar + '</td>' +
            '<td>' + actionHtml + '</td>';
        tbody.appendChild(tr);

        // Render batch rows if expanded
        if (hasBatches && isExpanded) {
            var batchKeys = Object.keys(p.batches);
            batchKeys.forEach(function(bKey, bIdx) {
                var b = p.batches[bKey];
                var bStatus = getExpiryStatus(b.kadaluarsa);
                var bTr = document.createElement('tr');
                bTr.className = 'batch-row';

                var bStockCls = b.stock === 0 ? 'empty' : b.stock <= 5 ? 'low' : 'ok';
                var bExpBadge = bStatus ? '<span class="exp-badge ' + bStatus.cls + '" style="font-size:10px;padding:2px 6px;">' + bStatus.label + '</span>' : '<span style="font-size:11px;color:var(--ink3);">—</span>';
                var bDays = bStatus ? (bStatus.status === 'expired' ? Math.abs(bStatus.days) + 'h lalu' : bStatus.days + 'h') : '—';

                var bAction = '';
                if (bStatus && (bStatus.status === 'expired' || bStatus.status === 'critical') && b.stock > 0) {
                    bAction = '<button class="discard-btn" onclick="event.stopPropagation(); discardBatch(\'' + id + '\', \'' + bKey + '\', \'' + (p.name || '').replace(/'/g, "\\'") + '\')">🗑 Buang</button>';
                }

                bTr.innerHTML =
                    '<td></td><td></td>' +
                    '<td><span class="batch-label">Batch ' + (bIdx + 1) + '</span></td>' +
                    '<td><span class="stock-pill ' + bStockCls + '">' + (b.stock || 0) + '</span></td>' +
                    '<td></td>' +
                    '<td style="font-family:DM Mono,monospace; font-size:12px;">' + fmtTgl(b.kadaluarsa) + '</td>' +
                    '<td>' + bExpBadge + '</td>' +
                    '<td style="font-family:DM Mono,monospace; font-size:11px;">' + bDays + '</td>' +
                    '<td>' + bAction + '</td>';
                tbody.appendChild(bTr);
            });
        }
    });
}

// ===== FIREBASE LISTENER =====
try {
    var cached = localStorage.getItem('productsCache');
    if (cached) {
        productsData = JSON.parse(cached);
        renderSummary();
        renderTable();
    }
} catch(e) {}

if (productsRef) {
    productsRef.on('value', function(snapshot) {
        productsData = snapshot.val() || {};
        try { localStorage.setItem('productsCache', JSON.stringify(productsData)); } catch(e) {}
        renderSummary();
        renderTable();
        refreshCountdown = refreshInterval;
        updateLastUpdate();
    });
}

// Fix bulkDiscard to use db.ref properly
function bulkDiscard() {
    var ids = Object.keys(selectedRows);
    if (ids.length === 0) return;
    if (!confirm('⚠ Hapus/dibuang ' + ids.length + ' produk terpilih?\n\nStok akan dijadikan 0 dan tanggal kadaluarsa dihapus.\nTindakan ini tidak dapat dibatalkan.')) return;
    var updates = {};
    ids.forEach(function(id) {
        updates[id + '/stock'] = 0;
        updates[id + '/kadaluarsa'] = null;
    });
    productsRef.update(updates).then(function() {
        showToast('✅ ' + ids.length + ' produk telah ditandai dibuang', 'success');
        selectedRows = {};
        updateBulkState();
    }).catch(function(e) {
        showToast('❌ Gagal: ' + e.message, 'error');
    });
}

// Start the auto-refresh timer
startRefreshTimer();
updateLastUpdate();
</script>
